<!doctype html>
<html lang="ar" dir="rtl" class="light">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>بوابة الطلاب | تسجيل حساب جديد</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
			rel="stylesheet"
		/>

		<script src="https://cdn.tailwindcss.com"></script>
		<script src="https://unpkg.com/lucide@latest"></script>
		<script>
			tailwind.config = {
				darkMode: "class",
				theme: {
					extend: {
						fontFamily: {
							sans: ["Cairo", "sans-serif"],
							display: ["Space Grotesk", "sans-serif"],
						},
						colors: {
							softPink: "#fce7e7",
							softYellow: "#fef4d4",
							softPurple: "#e9d5ff",
							accentPurple: "#9333ea",
							accentIndigo: "#6366f1",
							darkGray: "#4b5563",
							lightGray: "#f3f4f6",
							lockGray: "#e5e7eb",
						},
						boxShadow: {
							"soft-lg": "0 10px 25px rgba(0, 0, 0, 0.08)",
							"soft-xl": "0 15px 35px rgba(0, 0, 0, 0.1)",
							"soft-2xl": "0 20px 50px rgba(0, 0, 0, 0.12)",
							"glow-purple": "0 0 0 3px rgba(147, 51, 234, 0.15), 0 0 20px rgba(147, 51, 234, 0.2)",
							"glow-green": "0 0 0 3px rgba(34, 197, 94, 0.15), 0 0 20px rgba(34, 197, 94, 0.2)",
						},
						animation: {
							"slide-in": "slideIn 0.6s ease-out",
						},
						keyframes: {
							slideIn: {
								from: { opacity: "0", transform: "translateY(12px)" },
								to: { opacity: "1", transform: "translateY(0)" },
							},
						},
					},
				},
			};
		</script>

		<style>
			@keyframes popCheck {
				0% {
					opacity: 0;
					transform: scale(0.45);
				}
				70% {
					opacity: 1;
					transform: scale(1.18);
				}
				100% {
					opacity: 1;
					transform: scale(1);
				}
			}

			:root {
				--bg-a: #fff6f1;
				--bg-b: #f7f2ff;
				--bg-c: #fffdf8;
			}

			body {
				background: radial-gradient(circle at 15% 10%, rgba(255, 184, 159, 0.34), transparent 32%),
					radial-gradient(circle at 82% 18%, rgba(139, 124, 246, 0.22), transparent 38%),
					radial-gradient(circle at 72% 88%, rgba(255, 211, 186, 0.28), transparent 34%),
					linear-gradient(145deg, var(--bg-a), var(--bg-b) 52%, var(--bg-c));
				min-height: 100vh;
			}

			.glass {
				background: linear-gradient(140deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0.54));
				border: 1px solid rgba(255, 255, 255, 0.7);
				backdrop-filter: blur(14px);
			}

			.geo-shape {
				position: absolute;
				pointer-events: none;
				z-index: -1;
				border: 1px solid rgba(147, 51, 234, 0.18);
				background: linear-gradient(155deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.1));
				backdrop-filter: blur(8px);
			}

			.field-shell {
				background: rgba(255, 255, 255, 0.58);
				border: 1px solid rgba(147, 51, 234, 0.18);
				transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
			}

			.field-shell:focus-within {
				border-color: rgba(147, 51, 234, 0.48);
				box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.12);
				background: rgba(255, 255, 255, 0.7);
			}

			.check-animate {
				animation: popCheck 0.4s ease forwards;
			}

			.cta-glow:hover {
				transform: translateY(-2px);
				box-shadow: 0 0 0 1px rgba(147, 51, 234, 0.45), 0 14px 35px rgba(147, 51, 234, 0.34);
			}
		</style>
	</head>

	<body class="min-h-screen text-darkGray antialiased selection:bg-accentPurple/20 selection:text-accentPurple">
		<div class="relative isolate overflow-hidden">
			<div class="geo-shape h-64 w-64 -left-20 top-20 rotate-12 [clip-path:polygon(50%_0%,100%_50%,50%_100%,0%_50%)]"></div>
			<div class="geo-shape h-72 w-72 -right-28 bottom-8 rotate-6 [clip-path:polygon(50%_0%,95%_35%,78%_100%,22%_100%,5%_35%)]"></div>
			<div
				class="pointer-events-none absolute inset-0 -z-10 bg-[radial-gradient(circle_at_20%_15%,rgba(248,185,235,0.15),transparent_40%),radial-gradient(circle_at_85%_90%,rgba(165,142,251,0.12),transparent_45%)]"
			></div>
			<div class="pointer-events-none absolute top-10 -left-32 -z-10 h-80 w-80 rounded-full bg-softPink/30 blur-3xl opacity-60"></div>
			<div class="pointer-events-none absolute bottom-10 -right-32 -z-10 h-80 w-80 rounded-full bg-softYellow/20 blur-3xl opacity-60"></div>

			<header class="mx-auto w-full max-w-6xl px-5 pt-6 sm:px-8">
				<nav class="glass flex items-center justify-between rounded-2xl px-4 py-3 shadow-soft-lg sm:px-6">
					<div class="flex items-center gap-3">
						<span
							class="grid h-10 w-10 place-items-center rounded-xl bg-gradient-to-br from-accentPurple to-accentIndigo font-display text-base font-bold text-white"
							>43</span
						>
						<div class="leading-tight">
							<p class="font-display text-sm tracking-wide text-darkGray">Batch 43</p>
							<p id="facultyText" class="mt-1 text-[11px] font-light tracking-wide text-darkGray/60 sm:text-xs">كلية العلوم الرياضية والحاسوب</p>
						</div>
					</div>

					<div class="flex items-center gap-1 rounded-full border border-accentPurple/20 bg-softPurple/40 px-1 py-1 text-xs backdrop-blur-sm">
						<button
							type="button"
							id="langAr"
							class="rounded-full px-3 py-1.5 font-semibold transition duration-300 inline-flex items-center gap-1.5"
						>
							<i data-lucide="languages" class="h-3.5 w-3.5"></i>
							<span>AR</span>
						</button>
						<button
							type="button"
							id="langEn"
							class="rounded-full px-3 py-1.5 font-semibold transition duration-300 inline-flex items-center gap-1.5"
						>
							<i data-lucide="languages" class="h-3.5 w-3.5"></i>
							<span>EN</span>
						</button>
					</div>
				</nav>
			</header>

			<main class="mx-auto w-full max-w-6xl px-5 pb-10 pt-8 sm:px-8 sm:pt-10">
				<section class="mx-auto max-w-xl">
					<div class="glass rounded-3xl p-5 shadow-soft-2xl sm:p-6">
						<div class="mb-4 text-center">
							<h1 id="pageTitle" class="font-display text-2xl font-medium text-darkGray sm:text-3xl">
								تسجيل حساب جديد
							</h1>
							<p id="pageSubtitle" class="mt-1.5 text-sm font-normal text-darkGray/70">
								أكمل البيانات التالية للانضمام إلى بوابة طلاب الدفعة 43
							</p>
						</div>

						<form id="registerForm" class="grid gap-3" autocomplete="off">
							<label class="block">
								<span id="labelStudentId" class="mb-1 block text-sm font-medium text-darkGray/90"
									>الرقم الجامعي</span
								>
								<div class="field-shell relative rounded-xl">
									<i data-lucide="id-card" class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-darkGray/45"></i>
									<input
										id="studentId"
										type="text"
										inputmode="numeric"
										maxlength="6"
										placeholder="مثال: 123456"
										class="w-full rounded-xl bg-transparent py-2.5 pl-10 pr-10 text-darkGray outline-none placeholder:text-darkGray/38"
									/>
									<span
										id="idCheck"
										class="pointer-events-none absolute left-3 top-1/2 hidden -translate-y-1/2 text-lg text-green-500"
										aria-hidden="true"
									>
										✓
									</span>
								</div>
							</label>

							<label class="block">
								<span id="labelFullName" class="mb-1 block text-sm font-medium text-darkGray/90"
									>الاسم الكامل</span
								>
								<div class="field-shell relative rounded-xl">
									<i data-lucide="pen-line" class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-darkGray/45"></i>
									<input
										id="fullName"
										type="text"
										disabled
										readonly
										class="w-full cursor-not-allowed rounded-xl bg-transparent py-2.5 pl-4 pr-10 text-darkGray/70 outline-none"
									/>
								</div>
							</label>

							<label class="block">
								<span id="labelMajor" class="mb-1 block text-sm font-medium text-darkGray/90">التخصص</span>
								<div class="field-shell relative rounded-xl">
									<i data-lucide="scroll-text" class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-darkGray/45"></i>
									<input
										id="major"
										type="text"
										disabled
										readonly
										class="w-full cursor-not-allowed rounded-xl bg-transparent py-2.5 pl-4 pr-10 text-darkGray/70 outline-none"
									/>
								</div>
							</label>

							<label class="block">
								<span id="labelEmail" class="mb-1 block text-sm font-medium text-darkGray/90"
									>البريد الإلكتروني</span
								>
								<div class="field-shell relative rounded-xl">
									<i data-lucide="mail" class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-darkGray/45"></i>
									<input
										id="email"
										type="email"
										placeholder="name@university.edu"
										class="w-full rounded-xl bg-transparent py-2.5 pl-4 pr-10 text-darkGray outline-none transition placeholder:text-darkGray/38"
										required
									/>
								</div>
							</label>

							<label class="block">
								<span id="labelPassword" class="mb-1 block text-sm font-medium text-darkGray/90"
									>كلمة المرور</span
								>
								<div class="field-shell relative rounded-xl">
									<i data-lucide="lock-keyhole" class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-darkGray/45"></i>
									<input
										id="password"
										type="password"
										placeholder="••••••••"
										class="w-full rounded-xl bg-transparent py-2.5 pl-4 pr-10 text-darkGray outline-none transition placeholder:text-darkGray/38"
										required
									/>
								</div>
							</label>

							<label class="block">
								<span id="labelConfirmPassword" class="mb-1 block text-sm font-medium text-darkGray/90"
									>تأكيد كلمة المرور</span
								>
								<div class="field-shell relative rounded-xl">
									<i data-lucide="lock-keyhole" class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-darkGray/45"></i>
									<input
										id="confirmPassword"
										type="password"
										placeholder="••••••••"
										class="w-full rounded-xl bg-transparent py-2.5 pl-4 pr-10 text-darkGray outline-none transition placeholder:text-darkGray/38"
										required
									/>
								</div>
							</label>

							<button
								type="submit"
								id="registerButton"
								class="cta-glow mt-2 w-full rounded-xl bg-gradient-to-r from-accentPurple to-accentIndigo px-6 py-3 text-base font-bold text-white shadow-soft-lg transition duration-300"
							>
								تسجيل
							</button>

							<p id="loginHint" class="text-center text-sm text-darkGray/70">
								<span id="loginHintText">لديك حساب؟</span>
								<a id="loginLink" href="signup.html" class="font-semibold text-accentIndigo hover:text-accentPurple">سجل دخول</a>
							</p>
						</form>
					</div>
				</section>
			</main>
		</div>

		<script>
			const i18n = {
				ar: {
					title: "بوابة الطلاب | تسجيل حساب جديد",
					faculty: "كلية العلوم الرياضية والحاسوب",
					pageTitle: "تسجيل حساب جديد",
					pageSubtitle: "أكمل البيانات التالية للانضمام إلى بوابة طلاب الدفعة 43",
					labelStudentId: "الرقم الجامعي",
					studentIdPlaceholder: "مثال: 123456",
					labelFullName: "الاسم الكامل",
					labelMajor: "التخصص",
					labelEmail: "البريد الإلكتروني",
					emailPlaceholder: "name@university.edu",
					labelPassword: "كلمة المرور",
					passwordPlaceholder: "••••••••",
					labelConfirmPassword: "تأكيد كلمة المرور",
					confirmPasswordPlaceholder: "••••••••",
					registerButton: "تسجيل حساب",
					loginHint: "لديك حساب؟",
					loginLink: "سجل دخول",
					autoName: "أحمد علي حسن",
					autoMajor: "علوم حاسوب",
				},
				en: {
					title: "Student Portal | Register",
					faculty: "Faculty of Mathematical Sciences and Computing",
					pageTitle: "Create New Account",
					pageSubtitle: "Complete the form below to join Batch 43 Student Portal",
					labelStudentId: "Student ID",
					studentIdPlaceholder: "Example: 123456",
					labelFullName: "Full Name",
					labelMajor: "Major",
					labelEmail: "Email",
					emailPlaceholder: "name@university.edu",
					labelPassword: "Password",
					passwordPlaceholder: "••••••••",
					labelConfirmPassword: "Confirm Password",
					confirmPasswordPlaceholder: "••••••••",
					registerButton: "Register Account",
					loginHint: "Already have an account?",
					loginLink: "Login",
					autoName: "Ahmed Ali Hassan",
					autoMajor: "Computer Science",
				},
			};

			let currentLang = "ar";

			const el = {
				langAr: document.getElementById("langAr"),
				langEn: document.getElementById("langEn"),
				facultyText: document.getElementById("facultyText"),
				pageTitle: document.getElementById("pageTitle"),
				pageSubtitle: document.getElementById("pageSubtitle"),
				labelStudentId: document.getElementById("labelStudentId"),
				studentId: document.getElementById("studentId"),
				idCheck: document.getElementById("idCheck"),
				labelFullName: document.getElementById("labelFullName"),
				fullName: document.getElementById("fullName"),
				labelMajor: document.getElementById("labelMajor"),
				major: document.getElementById("major"),
				labelEmail: document.getElementById("labelEmail"),
				email: document.getElementById("email"),
				labelPassword: document.getElementById("labelPassword"),
				password: document.getElementById("password"),
				labelConfirmPassword: document.getElementById("labelConfirmPassword"),
				confirmPassword: document.getElementById("confirmPassword"),
				registerButton: document.getElementById("registerButton"),
				loginHint: document.getElementById("loginHint"),
				loginHintText: document.getElementById("loginHintText"),
				loginLink: document.getElementById("loginLink"),
			};

			function updateLanguageButtons() {
				const activeClass = "bg-gradient-to-r from-accentPurple to-accentIndigo text-white shadow-soft-lg";
				const inactiveClass = "text-darkGray/70";

				el.langAr.className =
					"rounded-full px-3 py-1.5 font-semibold transition duration-300 " +
					(currentLang === "ar" ? activeClass : inactiveClass);
				el.langEn.className =
					"rounded-full px-3 py-1.5 font-semibold transition duration-300 " +
					(currentLang === "en" ? activeClass : inactiveClass);
			}

			function setCheckmarkSide() {
				if (currentLang === "ar") {
					el.idCheck.classList.remove("right-4");
					el.idCheck.classList.add("left-4");
					return;
				}
				el.idCheck.classList.remove("left-4");
				el.idCheck.classList.add("right-4");
			}

			function applyLanguage(lang) {
				currentLang = lang;
				const t = i18n[lang];

				document.documentElement.lang = lang;
				document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
				document.title = t.title;

				el.facultyText.textContent = t.faculty;
				el.pageTitle.textContent = t.pageTitle;
				el.pageSubtitle.textContent = t.pageSubtitle;
				el.labelStudentId.textContent = t.labelStudentId;
				el.studentId.placeholder = t.studentIdPlaceholder;
				el.labelFullName.textContent = t.labelFullName;
				el.labelMajor.textContent = t.labelMajor;
				el.labelEmail.textContent = t.labelEmail;
				el.email.placeholder = t.emailPlaceholder;
				el.labelPassword.textContent = t.labelPassword;
				el.password.placeholder = t.passwordPlaceholder;
				el.labelConfirmPassword.textContent = t.labelConfirmPassword;
				el.confirmPassword.placeholder = t.confirmPasswordPlaceholder;
				el.registerButton.textContent = t.registerButton;
				el.loginHintText.textContent = t.loginHint;
				el.loginLink.textContent = t.loginLink;

				const isValidId = /^\d{6}$/.test(el.studentId.value);
				if (isValidId) {
					el.fullName.value = t.autoName;
					el.major.value = t.autoMajor;
				}

				updateLanguageButtons();
				setCheckmarkSide();
			}

			function showCheckmark() {
				el.idCheck.classList.remove("hidden", "check-animate");
				void el.idCheck.offsetWidth;
				el.idCheck.classList.add("check-animate");
			}

			function hideCheckmark() {
				el.idCheck.classList.add("hidden");
				el.idCheck.classList.remove("check-animate");
			}

			el.studentId.addEventListener("input", (event) => {
				const digitsOnly = event.target.value.replace(/\D/g, "").slice(0, 6);
				event.target.value = digitsOnly;

				const validId = /^\d{6}$/.test(digitsOnly);

				if (validId) {
					showCheckmark();
					el.fullName.value = i18n[currentLang].autoName;
					el.major.value = i18n[currentLang].autoMajor;
					return;
				}

				hideCheckmark();
				el.fullName.value = "";
				el.major.value = "";
			});

			el.langAr.addEventListener("click", () => applyLanguage("ar"));
			el.langEn.addEventListener("click", () => applyLanguage("en"));

			applyLanguage("ar");

			if (window.lucide) {
				window.lucide.createIcons();
			}
		</script>
	</body>
</html>
