<!doctype html>
<html lang="ar" dir="rtl" class="light">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>بوابة الطلاب | تسجيل حساب جديد</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
			rel="stylesheet"
		/>

		<script src="https://cdn.tailwindcss.com"></script>
		<script src="https://unpkg.com/lucide@latest"></script>
		<script>
			tailwind.config = {
				darkMode: "class",
				theme: {
					extend: {
						fontFamily: {
							sans: ["Cairo", "sans-serif"],
							display: ["Space Grotesk", "sans-serif"],
						},
						colors: {
							softPink: "#fce7e7",
							softYellow: "#fef4d4",
							softPurple: "#e9d5ff",
							accentPurple: "#9333ea",
							accentIndigo: "#6366f1",
							darkGray: "#4b5563",
							lightGray: "#f3f4f6",
							lockGray: "#e5e7eb",
						},
						boxShadow: {
							"soft-lg": "0 10px 25px rgba(0, 0, 0, 0.08)",
							"soft-xl": "0 15px 35px rgba(0, 0, 0, 0.1)",
							"soft-2xl": "0 20px 50px rgba(0, 0, 0, 0.12)",
							"glow-purple": "0 0 0 3px rgba(147, 51, 234, 0.15), 0 0 20px rgba(147, 51, 234, 0.2)",
							"glow-green": "0 0 0 3px rgba(34, 197, 94, 0.15), 0 0 20px rgba(34, 197, 94, 0.2)",
						},
						animation: {
							"slide-in": "slideIn 0.6s ease-out",
						},
						keyframes: {
							slideIn: {
								from: { opacity: "0", transform: "translateY(12px)" },
								to: { opacity: "1", transform: "translateY(0)" },
							},
						},
					},
				},
			};
		</script>

		<style>
			@keyframes popCheck {
				0% {
					opacity: 0;
					transform: scale(0.45);
				}
				70% {
					opacity: 1;
					transform: scale(1.18);
				}
				100% {
					opacity: 1;
					transform: scale(1);
				}
			}

			@keyframes logoPulse {
				0%,
				100% {
					box-shadow: 0 0 0 0 rgba(96, 165, 250, 0.24), 0 16px 36px rgba(77, 63, 142, 0.2);
				}
				50% {
					box-shadow: 0 0 0 12px rgba(96, 165, 250, 0), 0 20px 45px rgba(77, 63, 142, 0.28);
				}
			}

			:root {
				--bg-a: #f3e9ff;
				--bg-b: #ffe5d7;
			}

			body {
				background: linear-gradient(140deg, var(--bg-a), var(--bg-b));
				min-height: 100vh;
			}

			.glass {
				background: linear-gradient(140deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0.54));
				border: 1px solid rgba(255, 255, 255, 0.7);
				backdrop-filter: blur(14px);
			}

			.float-shape {
				position: absolute;
				pointer-events: none;
				z-index: -1;
				border: 1px solid rgba(255, 255, 255, 0.18);
				background: linear-gradient(155deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08));
				backdrop-filter: blur(28px);
			}

			.logo-orb {
				animation: logoPulse 2.8s ease-in-out infinite;
			}

			.field-shell {
				background: rgba(255, 255, 255, 0.58);
				border: 1px solid rgba(147, 51, 234, 0.18);
				transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
			}

			.field-shell:focus-within {
				border-color: rgba(147, 51, 234, 0.48);
				box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.12);
				background: rgba(255, 255, 255, 0.7);
			}

			.field-invalid {
				border-color: rgba(251, 146, 132, 0.72);
				box-shadow: 0 0 0 3px rgba(251, 146, 132, 0.16);
			}

			.check-animate {
				animation: popCheck 0.4s ease forwards;
			}

			.cta-glow:hover {
				transform: translateY(-2px);
				box-shadow: 0 0 0 1px rgba(147, 51, 234, 0.45), 0 14px 35px rgba(147, 51, 234, 0.34);
			}

			.cta-disabled {
				opacity: 0.55;
				cursor: not-allowed;
				box-shadow: none;
			}
		</style>
	</head>

	<body class="min-h-screen text-darkGray antialiased selection:bg-accentPurple/20 selection:text-accentPurple">
		<div class="relative isolate overflow-hidden">
			<div class="float-shape h-44 w-44 top-14 left-[8%] rotate-12 [clip-path:polygon(50%_0%,100%_45%,82%_100%,18%_100%,0%_45%)]"></div>
			<div class="float-shape h-52 w-52 top-20 right-[10%] -rotate-12 [clip-path:polygon(20%_0%,100%_12%,88%_100%,0%_88%)]"></div>
			<div class="float-shape h-36 w-36 top-44 left-1/2 -translate-x-1/2 rotate-6 rounded-[28px]"></div>
			<div class="float-shape h-56 w-56 top-28 right-[36%] rotate-3 [clip-path:polygon(50%_0%,100%_38%,82%_100%,16%_92%,0%_30%)]"></div>
			<div class="pointer-events-none absolute inset-0 -z-10 bg-[radial-gradient(circle_at_15%_12%,rgba(139,124,246,0.22),transparent_38%),radial-gradient(circle_at_82%_18%,rgba(255,184,159,0.25),transparent_45%)]"></div>

			<section class="mx-auto flex w-full max-w-6xl justify-center px-5 pt-6 sm:px-8 sm:pt-8">
				<div class="logo-orb inline-flex h-16 w-16 items-center justify-center rounded-full p-1.5 sm:h-20 sm:w-20">
					<img
						src="306845207_752117652624147_287869835984670059_n.jpg"
						alt="شعار كلية العلوم الرياضية والحاسوب"
						class="h-full w-full rounded-full object-cover drop-shadow-[0_10px_25px_rgba(191,219,254,0.7)]"
						onerror="this.style.display='none'"
					/>
				</div>
			</section>

			<main class="mx-auto w-full max-w-6xl px-5 pb-10 pt-8 sm:px-8 sm:pb-14 sm:pt-12">
				<section class="mx-auto w-full max-w-[90%] md:max-w-[500px]">
					<div class="glass rounded-3xl border border-white/20 p-5 shadow-[0_24px_55px_rgba(73,55,141,0.2)] sm:p-6">
						<div class="mb-4 text-center">
							<h1 id="pageTitle" class="font-display text-2xl font-medium text-darkGray sm:text-3xl">
								تسجيل حساب جديد
							</h1>
							<p id="pageSubtitle" class="mt-1.5 text-sm font-normal text-darkGray/70">
								أكمل البيانات التالية للانضمام إلى بوابة طلاب الدفعة 43
							</p>
						</div>

						<form id="registerForm" class="grid gap-3" autocomplete="off">
							<label class="block">
								<span id="labelStudentId" class="mb-1 block text-sm font-medium text-darkGray/90"
									>الرقم الجامعي</span
								>
								<div class="field-shell relative rounded-xl">
									<i data-lucide="id-card" class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-darkGray/45"></i>
									<input
										id="studentId"
										type="text"
										inputmode="numeric"
										maxlength="6"
										class="w-full rounded-xl bg-transparent py-3 pl-10 pr-10 text-base text-darkGray outline-none"
									/>
									<span
										id="idCheck"
										class="pointer-events-none absolute left-3 top-1/2 hidden -translate-y-1/2 text-lg text-green-500"
										aria-hidden="true"
									>
										✓
									</span>
								</div>
								<p id="lookupStatus" class="mt-1 text-xs text-darkGray/60"></p>
							</label>

							<label id="fullNameBlock" class="block opacity-60 blur-[0.6px] transition-all duration-500">
								<span id="labelFullName" class="mb-1 block text-sm font-medium text-darkGray/90"
									>الاسم الكامل</span
								>
								<div class="field-shell relative rounded-xl">
									<i data-lucide="pen-line" class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-darkGray/45"></i>
									<input
										id="fullName"
										type="text"
										disabled
										readonly
										class="w-full cursor-not-allowed rounded-xl bg-transparent py-3 pl-4 pr-10 text-base text-darkGray/70 outline-none"
									/>
								</div>
							</label>

							<label id="majorBlock" class="block opacity-60 blur-[0.6px] transition-all duration-500">
								<span id="labelMajor" class="mb-1 block text-sm font-medium text-darkGray/90">التخصص</span>
								<div id="majorShell" class="field-shell relative rounded-xl">
									<i data-lucide="scroll-text" class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-darkGray/45"></i>
									<input
										id="major"
										type="text"
										disabled
										readonly
										class="w-full cursor-not-allowed rounded-xl bg-transparent py-3 pl-4 pr-10 text-base text-darkGray/70 outline-none"
									/>
								</div>
							</label>

							<div id="registerOnlyFields" class="grid gap-3">
								<label class="block">
									<span id="labelEmail" class="mb-1 block text-sm font-medium text-darkGray/90"
										>البريد الإلكتروني</span
									>
									<div class="field-shell relative rounded-xl">
										<i data-lucide="mail" class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-darkGray/45"></i>
										<input
											id="email"
											type="email"
											class="w-full rounded-xl bg-transparent py-3 pl-4 pr-10 text-base text-darkGray outline-none transition"
											required
										/>
									</div>
								</label>

								<label class="block">
									<span id="labelPassword" class="mb-1 block text-sm font-medium text-darkGray/90"
										>كلمة المرور</span
									>
									<div id="passwordShell" class="field-shell relative rounded-xl">
										<i data-lucide="lock-keyhole" class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-darkGray/45"></i>
										<input
											id="password"
											type="password"
											class="w-full rounded-xl bg-transparent py-3 pl-10 pr-10 text-base text-darkGray outline-none transition"
											required
										/>
										<button type="button" class="toggle-visibility absolute left-3 top-1/2 -translate-y-1/2 text-darkGray/45 transition hover:text-accentIndigo" data-target="password" aria-label="Show or hide password">
											<i data-lucide="eye" class="h-4 w-4"></i>
										</button>
									</div>
									<p id="passwordStrengthHint" class="mt-1 text-xs text-darkGray/65"></p>
								</label>

								<label class="block">
									<span id="labelConfirmPassword" class="mb-1 block text-sm font-medium text-darkGray/90"
										>تأكيد كلمة المرور</span
									>
									<div id="confirmPasswordShell" class="field-shell relative rounded-xl">
										<i data-lucide="lock-keyhole" class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-darkGray/45"></i>
										<input
											id="confirmPassword"
											type="password"
											class="w-full rounded-xl bg-transparent py-3 pl-10 pr-10 text-base text-darkGray outline-none transition"
											required
										/>
										<button type="button" class="toggle-visibility absolute left-3 top-1/2 -translate-y-1/2 text-darkGray/45 transition hover:text-accentIndigo" data-target="confirmPassword" aria-label="Show or hide confirm password">
											<i data-lucide="eye" class="h-4 w-4"></i>
										</button>
									</div>
									<p id="passwordMismatch" class="mt-1 hidden text-xs text-[#d9776a]">كلمات المرور غير متطابقة</p>
								</label>

								<button
									type="submit"
									id="registerButton"
									class="cta-glow cta-disabled mt-2 w-full rounded-xl bg-gradient-to-r from-accentPurple to-accentIndigo px-6 py-3.5 text-base font-bold text-white shadow-soft-lg transition duration-300"
									disabled
								>
									تسجيل حساب
								</button>
							</div>

							<div id="loginOnlyFields" class="hidden grid gap-3">
								<div id="loginPasswordBlock" class="hidden opacity-0 translate-y-2 transition-all duration-500 grid gap-3">
									<label class="block">
										<span id="labelLoginPassword" class="mb-1 block text-sm font-medium text-darkGray/90">كلمة المرور</span>
										<div id="loginPasswordShell" class="field-shell relative rounded-xl">
											<span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-darkGray/45">
												<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
													<rect x="3" y="11" width="18" height="10" rx="2"></rect>
													<path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
												</svg>
											</span>
											<input
												id="loginPassword"
												type="password"
												class="w-full rounded-xl bg-transparent py-3 pl-10 pr-10 text-base text-darkGray outline-none transition"
											/>
											<button type="button" class="toggle-visibility absolute left-3 top-1/2 -translate-y-1/2 text-darkGray/45 transition hover:text-accentIndigo" data-target="loginPassword" aria-label="Show or hide login password">
												<i data-lucide="eye" class="h-4 w-4"></i>
											</button>
										</div>
									</label>
								</div>

								<button
									type="button"
									id="loginButton"
									class="cta-glow cta-disabled mt-2 w-full rounded-xl bg-gradient-to-r from-accentIndigo to-accentPurple px-6 py-3.5 text-base font-bold text-white shadow-soft-lg transition duration-300"
									disabled
								>
									تحقق من البيانات
								</button>
							</div>

							<p id="loginHint" class="text-center text-sm text-darkGray/70">
								<span id="loginHintText">لديك حساب؟</span>
								<a id="loginLink" href="#" class="font-semibold text-accentIndigo hover:text-accentPurple">تسجيل دخول</a>
							</p>
						</form>
					</div>
				</section>
			</main>
		</div>

		<script>
			const i18n = {
				ar: {
					title: "بوابة الطلاب | تسجيل حساب جديد",
					pageTitle: "تسجيل حساب جديد",
					pageSubtitle: "أكمل البيانات التالية للانضمام إلى بوابة طلاب الدفعة 43",
					loginTitle: "تسجيل الدخول الذكي",
					loginSubtitle: "التعرف التلقائي على الهوية الرقمية",
					labelStudentId: "الرقم الجامعي",
					labelFullName: "الاسم الكامل",
					labelMajor: "التخصص",
					labelEmail: "البريد الإلكتروني",
					labelPassword: "كلمة المرور",
					labelConfirmPassword: "تأكيد كلمة المرور",
					labelLoginPassword: "كلمة المرور",
					passwordWeakHint: "كلمة المرور يجب أن تكون 8 أحرف على الأقل وتحتوي رقمًا ورمزًا خاصًا.",
					passwordStrongHint: "كلمة المرور قوية.",
					passwordMismatch: "كلمات المرور غير متطابقة",
					registerButton: "تسجيل حساب",
					loginHint: "لديك حساب؟",
					loginLink: "تسجيل دخول",
					registerHint: "ليس لديك حساب؟",
					registerLink: "إنشاء حساب",
					loginButton: "دخول",
					loginButtonIdle: "تحقق من البيانات",
					lookupIdle: "",
					lookupLoading: "جارٍ التحقق من الرقم الجامعي...",
					lookupSuccess: "تم العثور على بيانات الطالب.",
					lookupFail: "لم يتم العثور على هذا الرقم.",
					autoName: "أحمد علي حسن",
					autoMajor: "علوم حاسوب",
				},
			};

			const currentLang = "ar";

			const el = {
				pageTitle: document.getElementById("pageTitle"),
				pageSubtitle: document.getElementById("pageSubtitle"),
				labelStudentId: document.getElementById("labelStudentId"),
				studentId: document.getElementById("studentId"),
				idCheck: document.getElementById("idCheck"),
				lookupStatus: document.getElementById("lookupStatus"),
				labelFullName: document.getElementById("labelFullName"),
				fullName: document.getElementById("fullName"),
				labelMajor: document.getElementById("labelMajor"),
				fullNameBlock: document.getElementById("fullNameBlock"),
				majorBlock: document.getElementById("majorBlock"),
				major: document.getElementById("major"),
				majorShell: document.getElementById("majorShell"),
				labelEmail: document.getElementById("labelEmail"),
				email: document.getElementById("email"),
				labelPassword: document.getElementById("labelPassword"),
				password: document.getElementById("password"),
				passwordShell: document.getElementById("passwordShell"),
				passwordStrengthHint: document.getElementById("passwordStrengthHint"),
				labelConfirmPassword: document.getElementById("labelConfirmPassword"),
				confirmPassword: document.getElementById("confirmPassword"),
				confirmPasswordShell: document.getElementById("confirmPasswordShell"),
				passwordMismatch: document.getElementById("passwordMismatch"),
				registerButton: document.getElementById("registerButton"),
				registerOnlyFields: document.getElementById("registerOnlyFields"),
				loginOnlyFields: document.getElementById("loginOnlyFields"),
				loginPasswordBlock: document.getElementById("loginPasswordBlock"),
				labelLoginPassword: document.getElementById("labelLoginPassword"),
				loginPassword: document.getElementById("loginPassword"),
				loginPasswordShell: document.getElementById("loginPasswordShell"),
				loginButton: document.getElementById("loginButton"),
				loginHint: document.getElementById("loginHint"),
				loginHintText: document.getElementById("loginHintText"),
				loginLink: document.getElementById("loginLink"),
			};

			const mockStudentDb = {
				"123456": { fullName: "نورة أحمد سالم", major: "تقنية معلومات" },
				"654321": { fullName: "سارة محمد عبدالله", major: "علوم حاسوب" },
			};

			let isLoginMode = false;
			let identityConfirmed = false;
			let loginPasswordFocused = false;
			let lookupToken = 0;

			function isStrongPassword(value) {
				return /^(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/.test(value);
			}

			function validatePasswords() {
				if (isLoginMode) {
					return;
				}
				const t = i18n[currentLang];
				const pass = el.password.value;
				const confirm = el.confirmPassword.value;
				const strong = isStrongPassword(pass);
				const hasConfirm = confirm.length > 0;
				const match = strong && hasConfirm && pass === confirm;

				el.passwordStrengthHint.textContent = pass.length === 0 ? "" : strong ? t.passwordStrongHint : t.passwordWeakHint;
				el.passwordStrengthHint.className = "mt-1 text-xs " + (strong ? "text-emerald-600" : "text-[#d9776a]");

				const mismatch = hasConfirm && pass !== confirm;
				el.passwordMismatch.textContent = t.passwordMismatch;
				el.passwordMismatch.classList.toggle("hidden", !mismatch);
				el.passwordShell.classList.toggle("field-invalid", hasConfirm && !strong);
				el.confirmPasswordShell.classList.toggle("field-invalid", mismatch);

				el.registerButton.disabled = !match;
				el.registerButton.classList.toggle("cta-disabled", !match);
			}

			function updateLoginButton() {
				const canLogin = identityConfirmed && loginPasswordFocused;
				el.loginButton.disabled = !canLogin;
				el.loginButton.classList.toggle("cta-disabled", !canLogin);
				el.loginButton.textContent = canLogin ? i18n[currentLang].loginButton : i18n[currentLang].loginButtonIdle;
			}

			function initializeArabicContent() {
				const t = i18n.ar;
				document.title = t.title;
				el.pageTitle.textContent = t.pageTitle;
				el.pageSubtitle.textContent = t.pageSubtitle;
				el.labelStudentId.textContent = t.labelStudentId;
				el.labelFullName.textContent = t.labelFullName;
				el.labelMajor.textContent = t.labelMajor;
				el.labelEmail.textContent = t.labelEmail;
				el.labelPassword.textContent = t.labelPassword;
				el.labelConfirmPassword.textContent = t.labelConfirmPassword;
				el.labelLoginPassword.textContent = t.labelLoginPassword;
				el.registerButton.textContent = t.registerButton;
				el.loginHintText.textContent = t.loginHint;
				el.loginLink.textContent = t.loginLink;
			}

			function showCheckmark() {
				el.idCheck.classList.remove("hidden", "check-animate");
				void el.idCheck.offsetWidth;
				el.idCheck.classList.add("check-animate");
			}

			function hideCheckmark() {
				el.idCheck.classList.add("hidden");
				el.idCheck.classList.remove("check-animate");
			}

			function resetIdentity() {
				identityConfirmed = false;
				el.fullName.value = "";
				el.major.value = "";
				el.fullName.parentElement.classList.remove("shadow-glow-purple");
				el.majorShell.classList.remove("shadow-glow-purple");
				el.fullNameBlock.classList.add("opacity-60", "blur-[0.6px]");
				el.majorBlock.classList.add("opacity-60", "blur-[0.6px]");
				if (isLoginMode) {
					el.fullNameBlock.classList.add("hidden", "opacity-0", "translate-y-2");
					el.majorBlock.classList.add("hidden", "opacity-0", "translate-y-2");
				}
				el.loginPasswordBlock.classList.add("hidden");
				loginPasswordFocused = false;
				hideCheckmark();
			}

			function setLookupStatus(message, colorClass) {
				el.lookupStatus.textContent = message;
				el.lookupStatus.className = "mt-1 text-xs " + colorClass;
			}

			function simulateFetchStudent(id) {
				return new Promise((resolve) => {
					setTimeout(() => {
						resolve(mockStudentDb[id] || null);
					}, 500);
				});
			}

			async function lookupStudent(id) {
				const t = i18n[currentLang];
				lookupToken += 1;
				const currentToken = lookupToken;
				resetIdentity();
				setLookupStatus(t.lookupLoading, "text-accentIndigo/80");
				const result = await simulateFetchStudent(id);
				if (currentToken !== lookupToken) {
					return;
				}
				if (result) {
					identityConfirmed = true;
					el.fullName.value = result.fullName;
					el.major.value = result.major;
					el.fullName.parentElement.classList.add("shadow-glow-purple");
					el.majorShell.classList.add("shadow-glow-purple");
					el.fullNameBlock.classList.remove("opacity-60", "blur-[0.6px]");
					el.majorBlock.classList.remove("opacity-60", "blur-[0.6px]");
					if (isLoginMode) {
						el.fullNameBlock.classList.remove("hidden");
						el.majorBlock.classList.remove("hidden");
						requestAnimationFrame(() => {
							el.fullNameBlock.classList.remove("opacity-0", "translate-y-2");
							el.majorBlock.classList.remove("opacity-0", "translate-y-2");
						});
					}
					if (isLoginMode) {
						el.loginPasswordBlock.classList.remove("hidden");
						requestAnimationFrame(() => {
							el.loginPasswordBlock.classList.remove("opacity-0", "translate-y-2");
						});
					}
					setLookupStatus(t.lookupSuccess, "text-emerald-600");
					showCheckmark();
				} else {
					identityConfirmed = false;
					setLookupStatus(t.lookupFail, "text-[#d9776a]");
					hideCheckmark();
				}
				updateLoginButton();
			}

			function setMode(nextMode) {
				const t = i18n[currentLang];
				isLoginMode = nextMode === "login";
				el.registerOnlyFields.classList.toggle("hidden", isLoginMode);
				el.loginOnlyFields.classList.toggle("hidden", !isLoginMode);
				el.loginPasswordBlock.classList.add("hidden");
				loginPasswordFocused = false;
				if (isLoginMode) {
					el.fullNameBlock.classList.add("hidden", "opacity-0", "translate-y-2");
					el.majorBlock.classList.add("hidden", "opacity-0", "translate-y-2");
				} else {
					el.fullNameBlock.classList.remove("hidden", "opacity-0", "translate-y-2");
					el.majorBlock.classList.remove("hidden", "opacity-0", "translate-y-2");
					el.fullNameBlock.classList.add("opacity-60", "blur-[0.6px]");
					el.majorBlock.classList.add("opacity-60", "blur-[0.6px]");
				}
				el.pageTitle.textContent = isLoginMode ? t.loginTitle : t.pageTitle;
				el.pageSubtitle.textContent = isLoginMode ? t.loginSubtitle : t.pageSubtitle;
				el.pageSubtitle.className = isLoginMode
					? "mt-1 text-xs font-light text-darkGray/60"
					: "mt-1.5 text-sm font-normal text-darkGray/70";
				el.loginHintText.textContent = isLoginMode ? t.registerHint : t.loginHint;
				el.loginLink.textContent = isLoginMode ? t.registerLink : t.loginLink;
				el.lookupStatus.textContent = t.lookupIdle;
				el.lookupStatus.className = "mt-1 text-xs text-darkGray/60";
				el.loginPassword.value = "";
				resetIdentity();
				updateLoginButton();
			}

			el.studentId.addEventListener("input", (event) => {
				const digitsOnly = event.target.value.replace(/\D/g, "").slice(0, 6);
				event.target.value = digitsOnly;

				const validId = /^\d{6}$/.test(digitsOnly);

				if (validId) {
					lookupStudent(digitsOnly);
					return;
				}

				lookupToken += 1;
				resetIdentity();
				setLookupStatus(i18n[currentLang].lookupIdle, "text-darkGray/60");
				updateLoginButton();
			});

			document.querySelectorAll(".toggle-visibility").forEach((btn) => {
				btn.addEventListener("click", () => {
					const targetId = btn.getAttribute("data-target");
					const field = document.getElementById(targetId);
					if (!field) {
						return;
					}

					const visible = field.type === "text";
					field.type = visible ? "password" : "text";
					btn.innerHTML = visible
						? '<i data-lucide="eye" class="h-4 w-4"></i>'
						: '<i data-lucide="eye-off" class="h-4 w-4"></i>';
					if (window.lucide) {
						window.lucide.createIcons();
					}
				});
			});

			el.password.addEventListener("input", validatePasswords);
			el.confirmPassword.addEventListener("input", validatePasswords);
			el.loginPassword.addEventListener("input", updateLoginButton);
			el.loginPassword.addEventListener("focus", () => {
				loginPasswordFocused = true;
				updateLoginButton();
			});
			el.loginPassword.addEventListener("blur", () => {
				loginPasswordFocused = false;
				updateLoginButton();
			});
			el.loginLink.addEventListener("click", (event) => {
				event.preventDefault();
				setMode(isLoginMode ? "register" : "login");
			});

			el.loginButton.addEventListener("click", () => {
				if (!el.loginButton.disabled) {
					window.location.href = "dashboard.html";
				}
			});

			el.registerForm = document.getElementById("registerForm");
			el.registerForm.addEventListener("submit", (event) => {
				event.preventDefault();
				if (!isLoginMode && !el.registerButton.disabled) {
					window.location.href = "dashboard.html";
				}
			});
			el.registerForm.addEventListener("keydown", (event) => {
				if (event.key !== "Enter") {
					return;
				}
				if (!isLoginMode) {
					return;
				}
				event.preventDefault();
				el.loginButton.click();
			});

			initializeArabicContent();
			validatePasswords();
			updateLoginButton();

			if (window.lucide) {
				window.lucide.createIcons();
			}
		</script>
	</body>
</html>
