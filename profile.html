<!doctype html>
<html lang="ar" dir="rtl" class="light">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>بوابة الطلاب | الملف الشخصي</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
			rel="stylesheet"
		/>

		<script src="https://cdn.tailwindcss.com"></script>
		<script src="https://unpkg.com/lucide@latest"></script>
		<script>
			tailwind.config = {
				darkMode: "class",
				theme: {
					extend: {
						fontFamily: {
							sans: ["Cairo", "sans-serif"],
							display: ["Space Grotesk", "sans-serif"],
						},
						colors: {
							accentPurple: "#9333ea",
							accentIndigo: "#6366f1",
							darkGray: "#4b5563",
						},
						boxShadow: {
							"soft-lg": "0 10px 25px rgba(0, 0, 0, 0.08)",
							"soft-xl": "0 15px 35px rgba(0, 0, 0, 0.1)",
							"soft-2xl": "0 25px 65px rgba(31, 41, 55, 0.18)",
						},
					},
				},
			};
		</script>

		<style>
			@keyframes fadeUp {
				from {
					opacity: 0;
					transform: translateY(14px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			body {
				background: linear-gradient(135deg, #fce7e7 0%, #fef4d4 35%, #ffffff 100%);
				min-height: 100vh;
			}

			.reveal {
				opacity: 0;
				animation: fadeUp 0.7s ease forwards;
			}

			.avatar-glow {
				box-shadow: 0 0 0 10px rgba(255, 255, 255, 0.7), 0 18px 40px rgba(147, 51, 234, 0.22);
			}

			.semester-box {
				height: 58px;
				width: 58px;
				border-radius: 16px;
				display: grid;
				place-items: center;
				border: 1px solid #e5e7eb;
				background: rgba(255, 255, 255, 0.75);
				box-shadow: 0 10px 24px rgba(148, 163, 184, 0.16);
			}

			.semester-completed {
				color: #ffffff;
				background: linear-gradient(135deg, #9333ea, #7c3aed);
				border-color: transparent;
			}

			.semester-current {
				color: #ffffff;
				background: linear-gradient(135deg, #9333ea, #06b6d4);
				border-color: rgba(14, 165, 233, 0.5);
				box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.22), 0 14px 28px rgba(79, 70, 229, 0.28);
			}

			.semester-pending {
				color: #94a3b8;
				background: rgba(248, 250, 252, 0.95);
				border: 1.5px dashed #cbd5e1;
			}
		</style>
	</head>

	<body class="min-h-screen text-darkGray antialiased selection:bg-accentPurple/20 selection:text-accentPurple">
		<div class="relative isolate overflow-hidden">
			<div class="pointer-events-none absolute inset-0 -z-10 bg-[radial-gradient(circle_at_20%_15%,rgba(248,185,235,0.15),transparent_40%),radial-gradient(circle_at_85%_90%,rgba(165,142,251,0.12),transparent_45%)]"></div>

			<header class="mx-auto w-full max-w-6xl px-5 pt-6 sm:px-8">
				<nav class="reveal flex items-center justify-between rounded-2xl border border-white/60 bg-white/70 px-4 py-3 backdrop-blur-md shadow-soft-lg sm:px-6">
					<div class="leading-tight">
						<p class="font-display text-sm tracking-wide text-darkGray sm:text-base">Batch 43</p>
						<p id="facultyText" class="mt-1 text-[11px] font-light tracking-wide text-darkGray/60 sm:text-xs">كلية العلوم الرياضية والحاسوب</p>
					</div>
					<div class="flex items-center gap-2 sm:gap-3">
						<a id="backButton" href="dashboard.html" class="inline-flex items-center gap-2 rounded-xl border border-accentIndigo/30 bg-white/85 px-3 py-2 text-xs font-semibold text-accentIndigo transition hover:bg-accentIndigo/10 sm:text-sm" title="العودة إلى لوحة التحكم">
							<i data-lucide="arrow-left" class="h-4 w-4"></i>
							<span id="backText">العودة إلى لوحة التحكم</span>
						</a>
						<div class="flex items-center gap-1 rounded-full border border-accentPurple/20 bg-purple-100/40 px-1 py-1 text-xs backdrop-blur-sm">
							<button type="button" id="langAr" class="rounded-full px-3 py-1.5 font-semibold transition duration-300">AR</button>
							<button type="button" id="langEn" class="rounded-full px-3 py-1.5 font-semibold transition duration-300">EN</button>
						</div>
					</div>
				</nav>
			</header>

			<main class="mx-auto grid min-h-[calc(100vh-120px)] w-full max-w-6xl place-items-center px-5 pb-14 pt-10 sm:px-8 sm:pt-14">
				<section class="reveal w-full max-w-3xl rounded-3xl border border-white/70 bg-white/90 p-6 shadow-soft-2xl backdrop-blur-3xl sm:p-9">
					<div class="flex flex-col items-center text-center">
						<div id="avatarPlaceholder" class="avatar-glow grid h-28 w-28 place-items-center rounded-full bg-gradient-to-br from-slate-200 to-violet-100">
							<i data-lucide="user-round" class="h-12 w-12 text-violet-600"></i>
						</div>
						<h1 id="studentName" class="mt-4 font-display text-3xl font-bold text-darkGray sm:text-4xl">Student Name</h1>
					</div>

					<div class="mt-8 grid grid-cols-1 gap-4 sm:grid-cols-2">
						<div class="rounded-2xl border border-slate-200/80 bg-white/80 p-4">
							<p id="idLabel" class="text-xs font-semibold tracking-wide text-darkGray/60">الرقم الجامعي</p>
							<p id="idValue" class="mt-1 text-base font-semibold text-darkGray">123456</p>
						</div>
						<div class="rounded-2xl border border-slate-200/80 bg-white/80 p-4">
							<p id="majorLabel" class="text-xs font-semibold tracking-wide text-darkGray/60">التخصص</p>
							<p id="majorValue" class="mt-1 text-base font-semibold text-darkGray">Selected Major</p>
						</div>
						<div class="rounded-2xl border border-slate-200/80 bg-white/80 p-4">
							<p id="emailLabel" class="text-xs font-semibold tracking-wide text-darkGray/60">البريد الإلكتروني</p>
							<p id="emailValue" class="mt-1 text-base font-semibold text-darkGray">name@email.com</p>
						</div>
						<div class="rounded-2xl border border-slate-200/80 bg-white/80 p-4">
							<p id="batchLabel" class="text-xs font-semibold tracking-wide text-darkGray/60">الدفعة</p>
							<p id="batchValue" class="mt-1 text-base font-semibold text-darkGray">Batch 43</p>
						</div>
					</div>

					<div class="mt-8 rounded-2xl border border-violet-100 bg-violet-50/60 p-5">
						<p id="progressTitle" class="text-sm font-semibold text-darkGray">التقدم الأكاديمي</p>
						<p id="journeyLabel" class="mt-2 text-sm font-semibold text-violet-700">المسار الأكاديمي: السنة الرابعة</p>
						<div id="semesterTracker" class="mt-4 overflow-x-auto pb-2" aria-label="Semester tracker">
							<div class="flex min-w-max items-center gap-2 sm:gap-3">
								<div class="semester-box semester-completed" title="Semester 1">
									<div class="text-center">
										<i data-lucide="check" class="mx-auto h-3.5 w-3.5"></i>
										<span class="text-[11px] font-bold">1</span>
									</div>
								</div>
								<div class="semester-box semester-completed" title="Semester 2">
									<div class="text-center">
										<i data-lucide="check" class="mx-auto h-3.5 w-3.5"></i>
										<span class="text-[11px] font-bold">2</span>
									</div>
								</div>
								<div class="semester-box semester-completed" title="Semester 3">
									<div class="text-center">
										<i data-lucide="check" class="mx-auto h-3.5 w-3.5"></i>
										<span class="text-[11px] font-bold">3</span>
									</div>
								</div>
								<div class="semester-box semester-completed" title="Semester 4">
									<div class="text-center">
										<i data-lucide="check" class="mx-auto h-3.5 w-3.5"></i>
										<span class="text-[11px] font-bold">4</span>
									</div>
								</div>
								<div class="semester-box semester-completed" title="Semester 5">
									<div class="text-center">
										<i data-lucide="check" class="mx-auto h-3.5 w-3.5"></i>
										<span class="text-[11px] font-bold">5</span>
									</div>
								</div>
								<div class="semester-box semester-completed" title="Semester 6">
									<div class="text-center">
										<i data-lucide="check" class="mx-auto h-3.5 w-3.5"></i>
										<span class="text-[11px] font-bold">6</span>
									</div>
								</div>
								<div class="semester-box semester-current" title="Semester 7">
									<div class="text-center">
										<i data-lucide="sparkles" class="mx-auto h-3.5 w-3.5"></i>
										<span class="text-[11px] font-bold">7</span>
									</div>
								</div>
								<div class="semester-box semester-pending" title="Semester 8"><span class="text-[11px] font-semibold">8</span></div>
								<div class="semester-box semester-pending" title="Semester 9"><span class="text-[11px] font-semibold">9</span></div>
								<div class="semester-box semester-pending" title="Semester 10"><span class="text-[11px] font-semibold">10</span></div>
							</div>
						</div>
						<p id="progressNote" class="mt-3 text-sm leading-7 text-darkGray/75">متبقي لك 4 سمسترات للتخرج</p>
					</div>

					<div class="mt-8">
						<a id="logoutButton" href="index.html" class="inline-flex items-center gap-2 rounded-xl border border-red-200 bg-red-50 px-4 py-2 text-sm font-semibold text-red-600 transition hover:bg-red-100" title="تسجيل الخروج">
							<i data-lucide="log-out" class="h-4 w-4"></i>
							<span id="logoutText">تسجيل الخروج</span>
						</a>
					</div>
				</section>
			</main>
		</div>

		<script>
			const i18n = {
				ar: {
					title: "بوابة الطلاب | الملف الشخصي",
					faculty: "كلية العلوم الرياضية والحاسوب",
					backText: "العودة إلى لوحة التحكم",
					backTooltip: "العودة إلى لوحة التحكم",
					studentName: "Student Name",
					avatarTooltip: "صورة الطالب",
					idLabel: "الرقم الجامعي",
					idValue: "123456",
					majorLabel: "التخصص",
					majorValue: "Selected Major",
					emailLabel: "البريد الإلكتروني",
					emailValue: "name@email.com",
					batchLabel: "الدفعة",
					batchValue: "Batch 43",
					progressAria: "متعقب السمسترات الأكاديمية",
					progressTitle: "التقدم الأكاديمي",
					journeyLabel: "المسار الأكاديمي: السنة الرابعة",
					progressNote: "متبقي لك 4 سمسترات للتخرج",
					logoutText: "تسجيل الخروج",
					logoutTooltip: "تسجيل الخروج",
				},
				en: {
					title: "Student Portal | Profile",
					faculty: "Faculty of Mathematical Sciences and Computing",
					backText: "Back to Dashboard",
					backTooltip: "Back to Dashboard",
					studentName: "Student Name",
					avatarTooltip: "Student avatar",
					idLabel: "University ID",
					idValue: "123456",
					majorLabel: "Major",
					majorValue: "Selected Major",
					emailLabel: "Email",
					emailValue: "name@email.com",
					batchLabel: "Batch",
					batchValue: "Batch 43",
					progressAria: "Academic semester tracker",
					progressTitle: "Academic Progress",
					journeyLabel: "Academic Journey: Year 4",
					progressNote: "You have 4 semesters left to graduate",
					logoutText: "Logout",
					logoutTooltip: "Logout",
				},
			};

			const el = {
				langAr: document.getElementById("langAr"),
				langEn: document.getElementById("langEn"),
				facultyText: document.getElementById("facultyText"),
				backButton: document.getElementById("backButton"),
				backText: document.getElementById("backText"),
				studentName: document.getElementById("studentName"),
				avatarPlaceholder: document.getElementById("avatarPlaceholder"),
				idLabel: document.getElementById("idLabel"),
				idValue: document.getElementById("idValue"),
				majorLabel: document.getElementById("majorLabel"),
				majorValue: document.getElementById("majorValue"),
				emailLabel: document.getElementById("emailLabel"),
				emailValue: document.getElementById("emailValue"),
				batchLabel: document.getElementById("batchLabel"),
				batchValue: document.getElementById("batchValue"),
				semesterTracker: document.getElementById("semesterTracker"),
				progressTitle: document.getElementById("progressTitle"),
				journeyLabel: document.getElementById("journeyLabel"),
				progressNote: document.getElementById("progressNote"),
				logoutButton: document.getElementById("logoutButton"),
				logoutText: document.getElementById("logoutText"),
			};

			let currentLang = "ar";

			function updateLanguageButtons() {
				const activeClass = "bg-gradient-to-r from-accentPurple to-accentIndigo text-white shadow-soft-lg";
				const inactiveClass = "text-darkGray/70";
				el.langAr.className = "rounded-full px-3 py-1.5 font-semibold transition duration-300 " + (currentLang === "ar" ? activeClass : inactiveClass);
				el.langEn.className = "rounded-full px-3 py-1.5 font-semibold transition duration-300 " + (currentLang === "en" ? activeClass : inactiveClass);
			}

			function applyLanguage(lang) {
				currentLang = lang;
				const t = i18n[lang];
				document.documentElement.lang = lang;
				document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
				document.title = t.title;
				el.facultyText.textContent = t.faculty;
				el.backText.textContent = t.backText;
				el.backButton.title = t.backTooltip;
				el.studentName.textContent = t.studentName;
				el.avatarPlaceholder.title = t.avatarTooltip;
				el.idLabel.textContent = t.idLabel;
				el.idValue.textContent = t.idValue;
				el.majorLabel.textContent = t.majorLabel;
				el.majorValue.textContent = t.majorValue;
				el.emailLabel.textContent = t.emailLabel;
				el.emailValue.textContent = t.emailValue;
				el.batchLabel.textContent = t.batchLabel;
				el.batchValue.textContent = t.batchValue;
				el.semesterTracker.setAttribute("aria-label", t.progressAria);
				el.progressTitle.textContent = t.progressTitle;
				el.journeyLabel.textContent = t.journeyLabel;
				el.progressNote.textContent = t.progressNote;
				el.logoutText.textContent = t.logoutText;
				el.logoutButton.title = t.logoutTooltip;
				updateLanguageButtons();
			}

			el.langAr.addEventListener("click", () => applyLanguage("ar"));
			el.langEn.addEventListener("click", () => applyLanguage("en"));
			if (window.lucide) {
				window.lucide.createIcons();
			}
			applyLanguage("ar");
		</script>
	</body>
</html>
