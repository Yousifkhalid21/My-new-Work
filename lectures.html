<!doctype html>
<html lang="ar" dir="rtl" class="light">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>بوابة الطلاب | المحاضرات والمواد</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

		<script src="https://cdn.tailwindcss.com"></script>
		<script src="https://unpkg.com/lucide@latest"></script>
		<script>
			tailwind.config = {
				theme: {
					extend: {
						fontFamily: {
							sans: ["Cairo", "sans-serif"],
						},
						colors: {
							lavender: "#8b7cf6",
							lavenderDeep: "#6a5ad9",
							peach: "#ffb89f",
							slateInk: "#2f2a3d",
						},
						boxShadow: {
							glassGlow: "0 18px 44px rgba(94, 76, 170, 0.24)",
							bookLift: "0 18px 28px rgba(98, 82, 181, 0.24)",
						},
					},
				},
			};
		</script>

		<style>
			:root {
				--bg-a: #fff5ef;
				--bg-b: #f7f0ff;
				--bg-c: #fffdfa;
				--glass-fill: rgba(255, 255, 255, 0.52);
				--glass-line: rgba(255, 255, 255, 0.65);
				--ink-soft: rgba(47, 42, 61, 0.7);
			}

			* {
				box-sizing: border-box;
			}

			body {
				font-family: "Cairo", sans-serif;
				min-height: 100vh;
				color: #2f2a3d;
				background: radial-gradient(circle at 12% 14%, rgba(255, 184, 159, 0.34), transparent 33%),
					radial-gradient(circle at 88% 18%, rgba(139, 124, 246, 0.24), transparent 42%),
					radial-gradient(circle at 76% 86%, rgba(255, 211, 186, 0.3), transparent 36%),
					linear-gradient(145deg, var(--bg-a), var(--bg-b) 52%, var(--bg-c));
			}

			.floating-shape {
				position: absolute;
				pointer-events: none;
				background: linear-gradient(145deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.15));
				border: 1px solid rgba(255, 255, 255, 0.55);
				backdrop-filter: blur(10px);
				animation: drift 16s ease-in-out infinite;
			}

			.shape-a {
				width: 220px;
				height: 220px;
				top: 8%;
				left: -95px;
				clip-path: polygon(50% 0%, 95% 35%, 80% 100%, 20% 100%, 5% 35%);
				animation-delay: 0s;
			}

			.shape-b {
				width: 270px;
				height: 270px;
				bottom: -120px;
				right: -90px;
				clip-path: polygon(50% 0%, 100% 52%, 50% 100%, 0% 52%);
				animation-delay: -4s;
			}

			.shape-c {
				width: 130px;
				height: 130px;
				top: 55%;
				right: 18%;
				border-radius: 28px;
				transform: rotate(20deg);
				animation-delay: -8s;
			}

			@keyframes drift {
				0%,
				100% {
					transform: translateY(0px) rotate(0deg);
				}
				50% {
					transform: translateY(-18px) rotate(3deg);
				}
			}

			.glass-panel {
				background: linear-gradient(145deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.42));
				border: 1px solid var(--glass-line);
				backdrop-filter: blur(14px);
			}

			.filter-btn {
				transition: transform 0.26s ease, box-shadow 0.26s ease, background 0.26s ease;
			}

			.filter-btn:hover {
				transform: translateY(-2px);
				box-shadow: 0 10px 22px rgba(106, 90, 217, 0.2);
			}

			.filter-btn.active {
				background: linear-gradient(125deg, #8b7cf6, #ffb89f);
				color: #ffffff;
				border-color: rgba(255, 255, 255, 0.8);
				box-shadow: 0 14px 28px rgba(106, 90, 217, 0.34);
			}

			.library-shelf {
				position: relative;
				padding: 1.2rem;
				border-radius: 1.6rem;
				background: linear-gradient(160deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.38));
				border: 1px solid rgba(255, 255, 255, 0.68);
				box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85), 0 14px 28px rgba(90, 74, 171, 0.16);
			}

			.shelf-row {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
				gap: 0.9rem;
			}

			.glass-book {
				position: relative;
				height: 168px;
				padding: 0.9rem 0.7rem;
				border-radius: 0.95rem;
				border: 1px solid rgba(255, 255, 255, 0.76);
				background: linear-gradient(175deg, rgba(255, 255, 255, 0.78), rgba(247, 243, 255, 0.48));
				box-shadow: inset 0 0 0 1px rgba(139, 124, 246, 0.1);
				cursor: pointer;
				overflow: hidden;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-direction: column;
				gap: 0.5rem;
				transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
			}

			.glass-book::before {
				content: "";
				position: absolute;
				inset: 0;
				background: linear-gradient(120deg, rgba(255, 255, 255, 0.3), transparent 42%, rgba(255, 255, 255, 0.22));
				pointer-events: none;
			}

			.glass-book:hover {
				transform: translateY(-5px) rotate(-1deg);
				box-shadow: var(--tw-shadow-bookLift);
				border-color: rgba(139, 124, 246, 0.45);
			}

			.glass-book.active {
				background: linear-gradient(175deg, rgba(255, 255, 255, 0.88), rgba(237, 229, 255, 0.68));
				border-color: rgba(139, 124, 246, 0.55);
				box-shadow: 0 16px 30px rgba(106, 90, 217, 0.26);
			}

			.book-icon {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				width: 2rem;
				height: 2rem;
				border-radius: 999px;
				border: 1px solid rgba(139, 124, 246, 0.28);
				background: rgba(255, 255, 255, 0.82);
				color: rgba(106, 90, 217, 0.92);
			}

			.book-title {
				text-align: center;
				direction: rtl;
				font-weight: 700;
				font-size: 0.84rem;
				line-height: 1.45;
				letter-spacing: 0.01em;
				color: rgba(47, 42, 61, 0.9);
				max-width: 94%;
			}

			.book-accent {
				position: absolute;
				right: 0;
				top: 0;
				width: 7px;
				height: 100%;
				background: linear-gradient(to bottom, rgba(139, 124, 246, 0.55), rgba(255, 184, 159, 0.45));
			}

			.view-stack {
				position: relative;
			}

			.view {
				opacity: 0;
				transform: translateY(12px) scale(0.99);
				pointer-events: none;
				position: absolute;
				inset: 0;
				transition: opacity 0.36s ease, transform 0.36s ease;
			}

			.view.active {
				opacity: 1;
				transform: translateY(0) scale(1);
				pointer-events: auto;
				position: relative;
			}

			.lecture-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
				gap: 0.95rem;
			}

			.lecture-card {
				border-radius: 1rem;
				border: 1px solid rgba(255, 255, 255, 0.75);
				background: linear-gradient(155deg, rgba(255, 255, 255, 0.83), rgba(245, 240, 255, 0.55));
				padding: 0.95rem;
				box-shadow: 0 12px 22px rgba(89, 72, 168, 0.16);
				transition: transform 0.25s ease, box-shadow 0.25s ease;
			}

			.lecture-card:hover {
				transform: translateY(-4px);
				box-shadow: 0 18px 28px rgba(89, 72, 168, 0.24);
			}

			.lecture-num {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				width: 2rem;
				height: 2rem;
				border-radius: 999px;
				font-weight: 800;
				font-size: 0.85rem;
				color: #6a5ad9;
				background: rgba(255, 255, 255, 0.85);
				border: 1px solid rgba(139, 124, 246, 0.45);
			}

			.icon-action {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 0.45rem;
				padding: 0.5rem 0.65rem;
				border-radius: 0.75rem;
				border: 1px solid rgba(139, 124, 246, 0.28);
				background: rgba(255, 255, 255, 0.76);
				font-size: 0.8rem;
				font-weight: 700;
				color: rgba(47, 42, 61, 0.86);
				transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
			}

			.icon-action:hover {
				transform: translateY(-2px);
				background: rgba(255, 255, 255, 0.92);
				box-shadow: 0 10px 16px rgba(106, 90, 217, 0.2);
			}

			.icon-action svg,
			.small-icon svg,
			.book-icon svg {
				stroke-width: 1.6;
			}

			@media (max-width: 1024px) {
				.floating-shape {
					opacity: 0.58;
				}
			}

			@media (max-width: 768px) {
				.shape-a,
				.shape-b {
					display: none;
				}

				.glass-book {
					height: 150px;
				}

				.book-title {
					font-size: 0.78rem;
				}
			}
		</style>
	</head>

	<body class="antialiased selection:bg-lavender/30">
		<div class="relative isolate overflow-hidden">
			<div class="floating-shape shape-a"></div>
			<div class="floating-shape shape-b"></div>
			<div class="floating-shape shape-c"></div>

			<header class="mx-auto w-full max-w-7xl px-4 pt-5 sm:px-7 sm:pt-6">
				<nav class="glass-panel flex items-center justify-between rounded-2xl px-4 py-3 shadow-glassGlow sm:px-6">
					<div class="flex items-center gap-3">
						<span class="grid h-10 w-10 place-items-center rounded-xl bg-gradient-to-br from-lavender to-peach text-sm font-extrabold text-white">43</span>
						<div>
							<p class="text-sm font-bold tracking-wide">Batch 43 Portal</p>
							<p class="text-xs text-slateInk/65">Lectures & Materials</p>
						</div>
					</div>
					<a href="dashboard.html" class="rounded-xl border border-lavender/30 bg-white/70 px-3 py-2 text-xs font-bold text-lavenderDeep transition hover:bg-lavender/10 sm:text-sm">العودة للوحة التحكم</a>
				</nav>
			</header>

			<main class="mx-auto w-full max-w-7xl px-4 pb-14 pt-8 sm:px-7 sm:pt-10">
				<section class="glass-panel rounded-3xl p-5 shadow-glassGlow sm:p-7">
					<div class="mb-6 flex flex-wrap items-start justify-between gap-3">
						<div>
							<h1 class="text-2xl font-extrabold sm:text-3xl">مكتبة المقررات والمحاضرات</h1>
							<p class="mt-1 text-sm text-slateInk/70 sm:text-base">اختر التخصص، ثم اختر كتاب المقرر للوصول السريع إلى المحاضرات والمواد.</p>
						</div>
						<div class="small-icon inline-flex items-center gap-2 rounded-full border border-white/75 bg-white/65 px-3 py-2 text-xs font-semibold text-slateInk/80">
							<i data-lucide="sparkles" class="h-4 w-4 text-lavenderDeep"></i>
							واجهة تفاعلية حديثة
						</div>
					</div>

					<div class="grid gap-5 lg:grid-cols-[220px_1fr]">
						<aside class="glass-panel rounded-2xl p-3">
							<p class="mb-3 px-1 text-xs font-bold tracking-wide text-slateInk/65">التخصصات</p>
							<div id="trackFilters" class="grid gap-2">
								<button data-track="cs" class="filter-btn active rounded-xl border border-white/80 bg-white/75 px-3 py-2.5 text-sm font-bold text-slateInk">علوم</button>
								<button data-track="math" class="filter-btn rounded-xl border border-white/80 bg-white/75 px-3 py-2.5 text-sm font-bold text-slateInk">رياضيات</button>
								<button data-track="stats" class="filter-btn rounded-xl border border-white/80 bg-white/75 px-3 py-2.5 text-sm font-bold text-slateInk">إحصاء</button>
								<button data-track="joint" class="filter-btn rounded-xl border border-white/80 bg-white/75 px-3 py-2.5 text-sm font-bold text-slateInk">مشترك</button>
							</div>
						</aside>

						<div class="view-stack">
							<div id="libraryView" class="view active">
								<div class="library-shelf">
									<div class="mb-4 text-center">
										<div>
											<p class="text-xs font-semibold text-slateInk/60">Course Library</p>
											<h2 id="shelfTitle" class="text-lg font-extrabold">رف مقررات علوم</h2>
										</div>
										<p class="mt-1 text-xs text-slateInk/65">اختر كتاباً لعرض شبكة المحاضرات</p>
									</div>
									<div id="bookShelf" class="shelf-row"></div>
								</div>
							</div>

							<div id="gridView" class="view">
								<div class="library-shelf">
									<div class="mb-4 flex flex-wrap items-center justify-between gap-2">
										<div>
											<p class="text-xs font-semibold text-slateInk/60">Lecture Grid</p>
											<h2 id="gridCourseTitle" class="text-lg font-extrabold"></h2>
										</div>
										<button id="backToShelf" type="button" class="rounded-xl border border-lavender/30 bg-white/75 px-3 py-2 text-xs font-bold text-lavenderDeep transition hover:bg-lavender/10">العودة إلى المكتبة</button>
									</div>
									<div id="lectureGrid" class="lecture-grid"></div>
								</div>
							</div>
						</div>
					</div>
				</section>
			</main>
		</div>

		<script>
			const specializationNames = {
				cs: "علوم الحاسوب",
				math: "الرياضيات",
				stats: "الإحصاء",
				joint: "المواد المشتركة",
			};

			const coursesByTrack = {
				cs: [
					{ title: "تفاعل الإنسان والحاسوب", lectures: 10, icon: "book-open" },
					{ title: "البرمجة الموجهة بالأشياء", lectures: 10, icon: "code-2" },
					{ title: "شبكات الحاسوب والإنترنت", lectures: 8, icon: "network" },
					{ title: "نظم المعلومات الإدارية", lectures: 8, icon: "database" },
				],
				math: [
					{ title: "نظرية الزمر", lectures: 8, icon: "book-open" },
					{ title: "الطرق الرياضية", lectures: 8, icon: "book-open" },
					{ title: "التوبولوجيا العامة", lectures: 8, icon: "book-open" },
					{ title: "نظرية الأعداد", lectures: 8, icon: "book-open" },
				],
				stats: [
					{ title: "أساليب أخذ العينات", lectures: 8, icon: "book-open" },
					{ title: "الاقتصاد القياسي", lectures: 8, icon: "book-open" },
					{ title: "الاقتصاد القياسي", lectures: 8, icon: "book-open" },
					{ title: "العمليات التصادفية", lectures: 8, icon: "book-open" },
				],
				joint: [
					{ title: "الذكاء الاصطناعي والنظم الخبيرة", lectures: 9, icon: "cpu" },
					{ title: "أساسيات هندسة البرمجيات", lectures: 9, icon: "code-2" },
					{ title: "تحليل السلاسل الزمنية", lectures: 9, icon: "network" },
				],
			};

			const state = {
				selectedTrack: "cs",
				selectedCourse: null,
			};

			const el = {
				trackFilters: document.getElementById("trackFilters"),
				shelfTitle: document.getElementById("shelfTitle"),
				bookShelf: document.getElementById("bookShelf"),
				libraryView: document.getElementById("libraryView"),
				gridView: document.getElementById("gridView"),
				gridCourseTitle: document.getElementById("gridCourseTitle"),
				lectureGrid: document.getElementById("lectureGrid"),
				backToShelf: document.getElementById("backToShelf"),
			};

			function setActiveFilter(track) {
				el.trackFilters.querySelectorAll("[data-track]").forEach((btn) => {
					btn.classList.toggle("active", btn.dataset.track === track);
				});
			}

			function renderBooks() {
				const courses = coursesByTrack[state.selectedTrack] || [];
				el.shelfTitle.textContent = "رف مقررات " + specializationNames[state.selectedTrack];
				el.bookShelf.innerHTML = courses
					.map((course, index) => {
						const iconName = course.icon || "book-open";
						return (
							'<button type="button" class="glass-book" data-course-index="' +
							index +
							'">' +
							'<span class="book-accent"></span>' +
							'<span class="book-icon"><i data-lucide="' +
							iconName +
							'" class="h-4 w-4"></i></span>' +
							'<span class="book-title">' +
							course.title +
							"</span>" +
							"</button>"
						);
					})
					.join("");
			}

			function switchView(viewName) {
				const isLibrary = viewName === "library";
				el.libraryView.classList.toggle("active", isLibrary);
				el.gridView.classList.toggle("active", !isLibrary);
			}

			function createLectureCard(lectureNo) {
				return (
					'<article class="lecture-card">' +
					'<div class="mb-3 flex items-center justify-between gap-2">' +
					'<h3 class="font-bold text-slateInk">المحاضرة ' +
					lectureNo +
					"</h3>" +
					'<span class="lecture-num">' +
					lectureNo +
					"</span>" +
					"</div>" +
					'<div class="grid gap-2">' +
					'<button type="button" class="icon-action">' +
					'<i data-lucide="file-text" class="h-4 w-4 text-lavenderDeep"></i>' +
					"تلخيص المحاضرة" +
					"</button>" +
					'<button type="button" class="icon-action">' +
					'<i data-lucide="clipboard-list" class="h-4 w-4 text-lavenderDeep"></i>' +
					"تمارين وتكليفات" +
					"</button>" +
					"</div>" +
					"</article>"
				);
			}

			function openLectureGrid(courseIndex) {
				const course = coursesByTrack[state.selectedTrack][courseIndex];
				if (!course) {
					return;
				}

				state.selectedCourse = course;
				el.gridCourseTitle.textContent = course.title;

				const cards = Array.from({ length: course.lectures }, (_, i) => createLectureCard(i + 1));
				el.lectureGrid.innerHTML = cards.join("");

				el.bookShelf.querySelectorAll(".glass-book").forEach((book, index) => {
					book.classList.toggle("active", index === courseIndex);
				});

				switchView("grid");
				if (window.lucide) {
					window.lucide.createIcons();
				}
			}

			el.trackFilters.addEventListener("click", (event) => {
				const button = event.target.closest("[data-track]");
				if (!button) {
					return;
				}

				state.selectedTrack = button.dataset.track;
				setActiveFilter(state.selectedTrack);
				renderBooks();
				switchView("library");
			});

			el.bookShelf.addEventListener("click", (event) => {
				const book = event.target.closest(".glass-book");
				if (!book) {
					return;
				}

				openLectureGrid(Number(book.getAttribute("data-course-index")));
			});

			el.backToShelf.addEventListener("click", () => {
				switchView("library");
			});

			setActiveFilter(state.selectedTrack);
			renderBooks();
			switchView("library");

			if (window.lucide) {
				window.lucide.createIcons();
			}
		</script>
	</body>
</html>
