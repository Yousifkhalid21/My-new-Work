<!doctype html>
<html lang="ar" dir="rtl" class="light">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>بوابة الطلاب | المحاضرات</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
			rel="stylesheet"
		/>

		<script src="https://cdn.tailwindcss.com"></script>
		<script src="https://unpkg.com/lucide@latest"></script>
		<script>
			tailwind.config = {
				darkMode: "class",
				theme: {
					extend: {
						fontFamily: {
							sans: ["Cairo", "sans-serif"],
							display: ["Space Grotesk", "sans-serif"],
						},
						colors: {
							softPink: "#fce7e7",
							softYellow: "#fef4d4",
							accentPurple: "#9333ea",
							accentIndigo: "#6366f1",
							darkGray: "#4b5563",
						},
						boxShadow: {
							"soft-lg": "0 10px 25px rgba(0, 0, 0, 0.08)",
							"soft-xl": "0 15px 35px rgba(0, 0, 0, 0.1)",
							"soft-2xl": "0 20px 50px rgba(0, 0, 0, 0.12)",
						},
					},
				},
			};
		</script>

		<style>
			@keyframes fadeUp {
				from {
					opacity: 0;
					transform: translateY(16px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.reveal {
				opacity: 0;
				animation: fadeUp 0.75s ease forwards;
			}

			.d1 {
				animation-delay: 80ms;
			}

			.d2 {
				animation-delay: 180ms;
			}

			.d3 {
				animation-delay: 280ms;
			}

			body {
				background: linear-gradient(135deg, #fce7e7 0%, #fef4d4 35%, #ffffff 100%);
				min-height: 100vh;
			}

			.card-hover {
				transition: transform 0.3s ease, box-shadow 0.3s ease;
			}

			.card-hover:hover {
				transform: translateY(-0.5rem);
				box-shadow: 0 28px 60px rgba(31, 41, 55, 0.18);
			}

			.major-active {
				background: linear-gradient(145deg, rgba(147, 51, 234, 0.16), rgba(99, 102, 241, 0.12));
				border-color: rgba(147, 51, 234, 0.45);
				box-shadow: 0 0 0 1px rgba(147, 51, 234, 0.2), 0 22px 48px rgba(99, 102, 241, 0.2);
			}

			.track-tab-active {
				background: linear-gradient(120deg, #9333ea 0%, #6366f1 100%);
				color: #ffffff;
				box-shadow: 0 14px 32px rgba(99, 102, 241, 0.35);
			}

			.schedule-card {
				background: linear-gradient(165deg, rgba(255, 255, 255, 0.96), rgba(250, 246, 255, 0.92));
				border: 1px solid rgba(167, 139, 250, 0.2);
			}

			.day-column {
				display: grid;
				gap: 0.75rem;
				min-width: 220px;
			}

			.subject-block {
				border-radius: 1rem;
				padding: 0.95rem;
				border: 1px solid rgba(148, 163, 184, 0.25);
				background: rgba(255, 255, 255, 0.85);
				backdrop-filter: blur(5px);
			}

			.subject-shared {
				border-inline-start: 4px solid #6366f1;
			}

			.subject-major {
				border-inline-start: 4px solid #0ea5e9;
			}

			@media (max-width: 900px) {
				.day-column {
					min-width: 100%;
				}
			}
		</style>
	</head>

	<body class="min-h-screen text-darkGray antialiased selection:bg-accentPurple/20 selection:text-accentPurple">
		<div class="relative isolate overflow-hidden">
			<div class="pointer-events-none absolute inset-0 -z-10 bg-[radial-gradient(circle_at_20%_15%,rgba(248,185,235,0.15),transparent_40%),radial-gradient(circle_at_85%_90%,rgba(165,142,251,0.12),transparent_45%)]"></div>

			<header class="mx-auto w-full max-w-7xl px-5 pt-6 sm:px-8">
				<nav class="reveal d1 flex items-center justify-between rounded-2xl border border-white/60 bg-white/70 px-4 py-3 backdrop-blur-md shadow-soft-lg sm:px-6">
					<div class="flex items-center gap-3">
						<span class="grid h-10 w-10 place-items-center rounded-xl bg-gradient-to-br from-accentPurple to-accentIndigo font-display text-base font-bold text-white">43</span>
						<div class="leading-tight">
							<p class="font-display text-sm tracking-wide text-darkGray">Batch 43</p>
							<p id="facultyText" class="mt-1 text-[11px] font-light tracking-wide text-darkGray/60 sm:text-xs">كلية العلوم الرياضية والحاسوب</p>
						</div>
					</div>

					<div class="flex items-center gap-2 sm:gap-3">
						<a id="backBtn" href="dashboard.html" class="rounded-xl border border-accentIndigo/30 bg-white/85 px-3 py-2 text-xs font-semibold text-accentIndigo transition hover:bg-accentIndigo/10 sm:text-sm">العودة للوحة التحكم</a>
						<div class="flex items-center gap-1 rounded-full border border-accentPurple/20 bg-purple-100/40 px-1 py-1 text-xs backdrop-blur-sm">
							<button type="button" id="langAr" class="rounded-full px-3 py-1.5 font-semibold transition duration-300">AR</button>
							<button type="button" id="langEn" class="rounded-full px-3 py-1.5 font-semibold transition duration-300">EN</button>
						</div>
					</div>
				</nav>
			</header>

			<main class="mx-auto w-full max-w-7xl px-5 pb-16 pt-10 sm:px-8 sm:pt-14">
				<section class="reveal d2 mb-8 rounded-3xl border border-white/70 bg-white/90 p-6 shadow-soft-2xl backdrop-blur-3xl sm:p-8">
					<h1 id="pageTitle" class="font-display text-3xl font-bold text-darkGray sm:text-4xl">المحاضرات والمواد</h1>
					<p id="pageSubtitle" class="mt-2 text-darkGray/70">اختر مسارك لعرض الجدول الأسبوعي (الإثنين - الخميس)</p>
				</section>

				<section class="reveal d2 mb-8 rounded-3xl border border-white/70 bg-white/90 p-4 shadow-soft-xl backdrop-blur-3xl sm:p-6">
					<h2 id="majorTitle" class="mb-4 font-display text-xl font-bold text-darkGray">مرشح المسار - الفصل السابع</h2>
					<div id="trackTabs" class="flex flex-wrap gap-3">
						<button data-track="cs" class="track-tab rounded-2xl border border-accentIndigo/25 bg-white px-4 py-2.5 text-sm font-semibold text-darkGray transition">علوم الحاسوب</button>
						<button data-track="math" class="track-tab rounded-2xl border border-accentIndigo/25 bg-white px-4 py-2.5 text-sm font-semibold text-darkGray transition">الرياضيات</button>
						<button data-track="stats" class="track-tab rounded-2xl border border-accentIndigo/25 bg-white px-4 py-2.5 text-sm font-semibold text-darkGray transition">الإحصاء</button>
						<button data-track="joint" class="track-tab rounded-2xl border border-accentIndigo/25 bg-white px-4 py-2.5 text-sm font-semibold text-darkGray transition">مشترك</button>
					</div>
					<p id="trackHint" class="mt-4 text-sm text-darkGray/65">يعرض الجدول المواد المشتركة مع مواد التخصص المحدد تلقائياً.</p>
				</section>

				<section class="reveal d3 schedule-card rounded-3xl p-5 shadow-soft-2xl sm:p-7">
					<div class="mb-5 flex flex-wrap items-center justify-between gap-4">
						<h2 id="subjectsTitle" class="font-display text-xl font-bold text-darkGray">الجدول الأسبوعي</h2>
						<span id="activeTrackLabel" class="rounded-full bg-accentIndigo/10 px-4 py-2 text-sm font-semibold text-accentIndigo"></span>
					</div>
					<div id="scheduleGrid" class="grid gap-4 md:grid-cols-2 xl:grid-cols-4"></div>
				</section>
			</main>
		</div>

		<script>
			const i18n = {
				ar: {
					title: "بوابة الطلاب | المحاضرات",
					faculty: "كلية العلوم الرياضية والحاسوب",
					back: "العودة للوحة التحكم",
					pageTitle: "المحاضرات والمواد",
					pageSubtitle: "اختر مسارك لعرض الجدول الأسبوعي (الإثنين - الخميس)",
					majorTitle: "مرشح المسار - الفصل السابع",
					subjectsTitle: "الجدول الأسبوعي",
					trackHint: "يعرض الجدول المواد المشتركة مع مواد التخصص المحدد تلقائياً.",
					activeTrack: "المسار الحالي:",
					days: {
						mon: "الإثنين",
						tue: "الثلاثاء",
						wed: "الأربعاء",
						thu: "الخميس",
					},
					jointBadge: "مشترك",
					majorBadge: "تخصص",
					tracks: {
						cs: "علوم الحاسوب",
						math: "الرياضيات",
						stats: "الإحصاء",
						joint: "مشترك",
					},
				},
				en: {
					title: "Student Portal | Lectures",
					faculty: "Faculty of Mathematical Sciences and Computing",
					back: "Back to Dashboard",
					pageTitle: "Lectures & Subjects",
					pageSubtitle: "Select your track to see the weekly timetable (Mon - Thu)",
					majorTitle: "Semester 7 Track Filter",
					subjectsTitle: "Weekly Timetable",
					trackHint: "The table automatically shows Joint courses plus your selected specialization.",
					activeTrack: "Active track:",
					days: {
						mon: "Monday",
						tue: "Tuesday",
						wed: "Wednesday",
						thu: "Thursday",
					},
					jointBadge: "Joint",
					majorBadge: "Specialization",
					tracks: {
						cs: "Computer Science",
						math: "Mathematics",
						stats: "Statistics",
						joint: "Joint",
					},
				},
			};

			const semesterData = {
				joint: [
					{ ar: "الذكاء الاصطناعي والنظم الخبيرة", en: "AI & Expert Systems", day: "mon", time: "08:30 - 10:00", type: "joint" },
					{ ar: "أساسيات هندسة البرمجيات", en: "Software Engineering", day: "tue", time: "10:30 - 12:00", type: "joint" },
					{ ar: "تحليل السلاسل الزمنية", en: "Time Series Analysis", day: "thu", time: "09:00 - 10:30", type: "joint" },
				],
				cs: [
					{ ar: "تفاعل الإنسان والحاسوب", en: "HCI", day: "mon", time: "12:30 - 14:00", type: "major" },
					{ ar: "البرمجة الموجهة بالأشياء", en: "OOP", day: "tue", time: "08:30 - 10:00", type: "major" },
					{ ar: "شبكات الحاسوب والانترنت", en: "Computer Networks", day: "wed", time: "10:30 - 12:00", type: "major" },
					{ ar: "نظم المعلومات الإدارية", en: "MIS", day: "thu", time: "12:30 - 14:00", type: "major" },
				],
				math: [
					{ ar: "نظرية الزمر", en: "Group Theory", day: "mon", time: "12:30 - 14:00", type: "major" },
					{ ar: "الطرق الرياضية", en: "Math Methods", day: "tue", time: "08:30 - 10:00", type: "major" },
					{ ar: "التبولوجيا العامة", en: "General Topology", day: "wed", time: "10:30 - 12:00", type: "major" },
					{ ar: "نظرية الأعداد", en: "Number Theory", day: "thu", time: "12:30 - 14:00", type: "major" },
				],
				stats: [
					{ ar: "أساليب أخذ العينات", en: "Sampling Methods", day: "mon", time: "12:30 - 14:00", type: "major" },
					{ ar: "الطرق الإحصائية", en: "Statistical Methods", day: "tue", time: "08:30 - 10:00", type: "major" },
					{ ar: "الاقتصاد القياسي", en: "Econometrics", day: "wed", time: "10:30 - 12:00", type: "major" },
					{ ar: "العمليات التصادفية", en: "Stochastic Processes", day: "thu", time: "12:30 - 14:00", type: "major" },
				],
			};

			const state = {
				lang: "ar",
				selectedTrack: "cs",
			};

			const el = {
				langAr: document.getElementById("langAr"),
				langEn: document.getElementById("langEn"),
				facultyText: document.getElementById("facultyText"),
				backBtn: document.getElementById("backBtn"),
				pageTitle: document.getElementById("pageTitle"),
				pageSubtitle: document.getElementById("pageSubtitle"),
				majorTitle: document.getElementById("majorTitle"),
				trackHint: document.getElementById("trackHint"),
				subjectsTitle: document.getElementById("subjectsTitle"),
				activeTrackLabel: document.getElementById("activeTrackLabel"),
				scheduleGrid: document.getElementById("scheduleGrid"),
				trackTabs: document.querySelectorAll(".track-tab"),
			};

			function updateLanguageButtons() {
				const activeClass = "bg-gradient-to-r from-accentPurple to-accentIndigo text-white shadow-soft-lg";
				const inactiveClass = "text-darkGray/70";
				el.langAr.className = "rounded-full px-3 py-1.5 font-semibold transition duration-300 " + (state.lang === "ar" ? activeClass : inactiveClass);
				el.langEn.className = "rounded-full px-3 py-1.5 font-semibold transition duration-300 " + (state.lang === "en" ? activeClass : inactiveClass);
			}

			function getCoursesForTrack() {
				if (state.selectedTrack === "joint") {
					return [...semesterData.joint];
				}
				return [...semesterData.joint, ...semesterData[state.selectedTrack]];
			}

			function renderSchedule() {
				const t = i18n[state.lang];
				const courses = getCoursesForTrack();
				const days = ["mon", "tue", "wed", "thu"];

				el.scheduleGrid.innerHTML = "";
				days.forEach((day) => {
					const column = document.createElement("article");
					column.className = "day-column rounded-2xl border border-white/70 bg-white/70 p-4";

					const dayCourses = courses.filter((course) => course.day === day);
					const blocks = dayCourses
						.map((course) => {
							const badge = course.type === "joint" ? t.jointBadge : t.majorBadge;
							const blockClass = course.type === "joint" ? "subject-shared" : "subject-major";
							return (
								'<div class="subject-block ' +
								blockClass +
								'">' +
								'<p class="text-[11px] font-semibold tracking-wide text-darkGray/60">' +
								badge +
								" | " +
								course.time +
								"</p>" +
								'<h3 class="mt-1 text-sm font-bold text-darkGray">' +
								(state.lang === "ar" ? course.ar : course.en) +
								"</h3>" +
								(state.lang === "ar"
									? '<p class="mt-1 text-xs text-darkGray/65">' + course.en + "</p>"
									: '<p class="mt-1 text-xs text-darkGray/65">' + course.ar + "</p>") +
								"</div>"
							);
						})
						.join("");

					column.innerHTML =
						'<header class="mb-2 flex items-center justify-between border-b border-slate-200/70 pb-2">' +
						'<h3 class="font-display text-base font-bold text-darkGray">' +
						t.days[day] +
						"</h3>" +
						'<i data-lucide="calendar-days" class="h-4 w-4 text-accentIndigo/70"></i>' +
						"</header>" +
						(blocks || '<p class="text-sm text-darkGray/60">No lectures</p>');

					el.scheduleGrid.appendChild(column);
				});

				el.activeTrackLabel.textContent = t.activeTrack + " " + t.tracks[state.selectedTrack];

				if (window.lucide) {
					window.lucide.createIcons();
				}
			}

			function updateTrackTabs() {
				el.trackTabs.forEach((tab) => {
					if (tab.dataset.track === state.selectedTrack) {
						tab.classList.add("track-tab-active");
					} else {
						tab.classList.remove("track-tab-active");
					}
				});
			}

			function applyLanguage(lang) {
				state.lang = lang;
				const t = i18n[lang];

				document.documentElement.lang = lang;
				document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
				document.title = t.title;
				el.facultyText.textContent = t.faculty;
				el.backBtn.textContent = t.back;
				el.pageTitle.textContent = t.pageTitle;
				el.pageSubtitle.textContent = t.pageSubtitle;
				el.majorTitle.textContent = t.majorTitle;
				el.trackHint.textContent = t.trackHint;
				el.subjectsTitle.textContent = t.subjectsTitle;
				el.trackTabs.forEach((tab) => {
					tab.textContent = t.tracks[tab.dataset.track];
				});

				updateLanguageButtons();
				renderSchedule();
			}

			el.trackTabs.forEach((tab) => {
				tab.addEventListener("click", () => {
					state.selectedTrack = tab.dataset.track;
					updateTrackTabs();
					renderSchedule();
				});
			});

			el.langAr.addEventListener("click", () => applyLanguage("ar"));
			el.langEn.addEventListener("click", () => applyLanguage("en"));

			updateTrackTabs();
			applyLanguage("ar");

			if (window.lucide) {
				window.lucide.createIcons();
			}
		</script>
	</body>
</html>
