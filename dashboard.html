<!doctype html>
<html lang="ar" dir="rtl" class="light">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>بوابة الطلاب | لوحة التحكم</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
			rel="stylesheet"
		/>

		<script src="https://cdn.tailwindcss.com"></script>
		<script src="https://unpkg.com/lucide@latest"></script>
		<script>
			tailwind.config = {
				darkMode: "class",
				theme: {
					extend: {
						fontFamily: {
							sans: ["Cairo", "sans-serif"],
							display: ["Space Grotesk", "sans-serif"],
						},
						colors: {
							softPink: "#fce7e7",
							softYellow: "#fef4d4",
							accentPurple: "#9333ea",
							accentIndigo: "#6366f1",
							darkGray: "#4b5563",
							lightGray: "#f3f4f6",
							lockGray: "#e5e7eb",
							successGreen: "#10b981",
						},
						boxShadow: {
							"soft-lg": "0 10px 25px rgba(0, 0, 0, 0.08)",
							"soft-xl": "0 15px 35px rgba(0, 0, 0, 0.1)",
							"soft-2xl": "0 20px 50px rgba(0, 0, 0, 0.12)",
						},
					},
				},
			};
		</script>

		<style>
			body {
				background: linear-gradient(135deg, #f3e9ff 0%, #ffe5d7 55%, #fff7f1 100%);
				min-height: 100vh;
			}

			.glass-card {
				background: rgba(255, 255, 255, 0.7);
				border: 1px solid rgba(255, 255, 255, 0.1);
				backdrop-filter: blur(20px);
			}

			@keyframes haloPulse {
				0%,
				100% {
					box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.35), 0 0 18px rgba(191, 219, 254, 0.35);
				}
				50% {
					box-shadow: 0 0 0 6px rgba(255, 255, 255, 0), 0 0 26px rgba(191, 219, 254, 0.45);
				}
			}

			.logo-pulse {
				animation: haloPulse 2.8s ease-in-out infinite;
			}

			.card-hover {
				transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
			}

			.card-hover:hover {
				transform: translateY(-6px);
				border-color: rgba(147, 51, 234, 0.55);
				box-shadow: 0 18px 45px rgba(101, 85, 204, 0.24);
			}
		</style>
	</head>

	<body class="min-h-screen text-darkGray antialiased selection:bg-accentPurple/20 selection:text-accentPurple">
		<div class="relative isolate overflow-hidden">
			<div class="pointer-events-none absolute inset-0 -z-10 bg-[radial-gradient(circle_at_20%_15%,rgba(248,185,235,0.15),transparent_40%),radial-gradient(circle_at_85%_90%,rgba(165,142,251,0.12),transparent_45%)]"></div>

			<header class="mx-auto hidden w-full max-w-7xl px-5 pt-6 sm:px-8 md:block">
				<nav class="glass-card flex items-center justify-between rounded-2xl px-4 py-3 shadow-soft-lg sm:px-6">
					<p class="font-display text-sm tracking-wide text-darkGray sm:text-base">Batch 43</p>
					<div class="flex items-center gap-2">
						<div class="flex items-center gap-1 rounded-full border border-white/20 bg-white/60 px-1 py-1 text-xs backdrop-blur-sm">
							<button type="button" id="langAr" class="rounded-full px-3 py-1.5 font-semibold transition duration-300">AR</button>
							<button type="button" id="langEn" class="rounded-full px-3 py-1.5 font-semibold transition duration-300">EN</button>
						</div>
					</div>
				</nav>
			</header>

			<main class="mx-auto w-full max-w-7xl px-5 pb-24 pt-10 sm:px-8 sm:pt-14">
				<section class="mb-6 flex justify-center">
					<div class="glass-card logo-pulse flex h-20 w-20 items-center justify-center rounded-full">
						<img
							src="306845207_752117652624147_287869835984670059_n.jpg"
							alt="شعار كلية العلوم الرياضية والحاسوب"
							class="h-16 w-16 rounded-full object-cover drop-shadow-[0_12px_30px_rgba(191,219,254,0.7)]"
							onerror="this.style.display='none'"
						/>
					</div>
				</section>

				<section class="mb-8">
					<div class="glass-card relative rounded-3xl px-6 py-6 shadow-soft-2xl sm:px-8 sm:py-8">
						<div id="welcomeText" class="space-y-3 text-right">
							<h1 id="welcomeTitle" class="font-display text-2xl font-bold text-darkGray sm:text-3xl">مرحباً بك،</h1>
							<p id="welcomeName" class="text-lg font-semibold text-darkGray/80">Student Name</p>
							<div class="inline-flex items-center gap-2 rounded-full border border-white/20 bg-white/60 px-3 py-1 text-xs font-semibold text-purple-700 shadow-soft-lg">
								<span id="statusText">عضو معتمد | الدفعة 43</span>
							</div>
						</div>
					</div>
				</section>

				<section class="grid grid-cols-2 gap-4 md:grid-cols-4">
					<a
						id="coursesCard"
						href="lectures.html"
						title="اذهب إلى صفحة المحاضرات"
						class="glass-card card-hover flex aspect-square flex-col items-start justify-between rounded-3xl p-5"
					>
						<div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white/70 shadow-soft-lg">
							<i data-lucide="book-open" class="h-6 w-6 text-accentIndigo"></i>
						</div>
						<div>
							<h2 id="coursesTitle" class="font-display text-base font-semibold text-darkGray">المواد والمحاضرات</h2>
							<p id="coursesDesc" class="mt-1 text-xs text-darkGray/70">وصول سريع لمحتواك الدراسي.</p>
						</div>
					</a>

					<a
						id="batchAffairsCard"
						href="batch_affairs.html"
						title="اذهب إلى صفحة مجتمع الدفعة"
						class="glass-card card-hover flex aspect-square flex-col items-start justify-between rounded-3xl p-5"
					>
						<div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white/70 shadow-soft-lg">
							<i data-lucide="messages-square" class="h-6 w-6 text-violet-500"></i>
						</div>
						<div>
							<h2 id="batchAffairsTitle" class="font-display text-base font-semibold text-darkGray">مجتمع الدفعة</h2>
							<p id="batchAffairsDesc" class="mt-1 text-xs text-darkGray/70">مشاركة سريعة مع زملائك.</p>
						</div>
					</a>

					<a
						id="alertsCard"
						href="alerts.html"
						title="اذهب إلى صفحة التنبيهات"
						class="glass-card card-hover flex aspect-square flex-col items-start justify-between rounded-3xl p-5"
					>
						<div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white/70 shadow-soft-lg">
							<i data-lucide="bell" class="h-6 w-6 text-emerald-500"></i>
						</div>
						<div>
							<h2 id="alertsTitle" class="font-display text-base font-semibold text-darkGray">التنبيهات</h2>
							<p id="alertsDesc" class="mt-1 text-xs text-darkGray/70">آخر المستجدات أولاً.</p>
						</div>
					</a>

					<a
						id="profileCard"
						href="profile.html"
						title="اذهب إلى صفحة الملف الشخصي"
						class="glass-card card-hover flex aspect-square flex-col items-start justify-between rounded-3xl p-5"
					>
						<div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white/70 shadow-soft-lg">
							<i data-lucide="id-card" class="h-6 w-6 text-sky-500"></i>
						</div>
						<div>
							<h2 id="profileTitle" class="font-display text-base font-semibold text-darkGray">الملف الشخصي</h2>
							<p class="mt-1 text-xs text-darkGray/70"><span id="nameLabel" class="font-semibold">الاسم:</span> <span id="nameValue">Student Name</span></p>
						</div>
					</a>
				</section>
			</main>

			<nav class="glass-card fixed bottom-5 left-1/2 z-20 flex w-[90%] max-w-sm -translate-x-1/2 items-center justify-between rounded-2xl px-4 py-3 shadow-soft-xl md:hidden">
				<a href="lectures.html" class="flex flex-col items-center text-xs text-darkGray/70">
					<i data-lucide="book-open" class="h-5 w-5 text-accentIndigo"></i>
					<span class="mt-1">المواد</span>
				</a>
				<a href="batch_affairs.html" class="flex flex-col items-center text-xs text-darkGray/70">
					<i data-lucide="messages-square" class="h-5 w-5 text-violet-500"></i>
					<span class="mt-1">المجتمع</span>
				</a>
				<a href="alerts.html" class="flex flex-col items-center text-xs text-darkGray/70">
					<i data-lucide="bell" class="h-5 w-5 text-emerald-500"></i>
					<span class="mt-1">التنبيهات</span>
				</a>
				<a href="profile.html" class="flex flex-col items-center text-xs text-darkGray/70">
					<i data-lucide="id-card" class="h-5 w-5 text-sky-500"></i>
					<span class="mt-1">الملف</span>
				</a>
			</nav>
		</div>

		<script>
			const i18n = {
				ar: {
					title: "بوابة الطلاب | لوحة التحكم",
					welcomeTitle: "مرحباً بك،",
					welcomeName: "Student Name",
					statusText: "عضو معتمد | الدفعة 43",
					coursesCardTooltip: "اذهب إلى صفحة المحاضرات",
					coursesTitle: "المواد والمحاضرات",
					coursesDesc: "وصول سريع لمحتواك الدراسي.",
					batchAffairsCardTooltip: "اذهب إلى صفحة مجتمع الدفعة",
					batchAffairsTitle: "مجتمع الدفعة",
					batchAffairsDesc: "مشاركة سريعة مع زملائك.",
					profileCardTooltip: "اذهب إلى صفحة الملف الشخصي",
					profileTitle: "الملف الشخصي",
					nameLabel: "الاسم:",
					nameValue: "Student Name",
					alertsCardTooltip: "اذهب إلى صفحة التنبيهات",
					alertsTitle: "التنبيهات",
					alertsDesc: "آخر المستجدات أولاً.",
				},
				en: {
					title: "Student Portal | Dashboard",
					welcomeTitle: "Welcome,",
					welcomeName: "Student Name",
					statusText: "Verified Member | Batch 43",
					coursesCardTooltip: "Go to lectures page",
					coursesTitle: "Lectures & Courses",
					coursesDesc: "Quick access to your materials.",
					batchAffairsCardTooltip: "Go to batch community page",
					batchAffairsTitle: "Batch Community",
					batchAffairsDesc: "Share and connect fast.",
					profileCardTooltip: "Go to profile page",
					profileTitle: "Student Profile",
					nameLabel: "Name:",
					nameValue: "Student Name",
					alertsCardTooltip: "Go to alerts page",
					alertsTitle: "Alerts",
					alertsDesc: "Latest updates first.",
				},
			};

			const el = {
				langAr: document.getElementById("langAr"),
				langEn: document.getElementById("langEn"),
				welcomeTitle: document.getElementById("welcomeTitle"),
				welcomeName: document.getElementById("welcomeName"),
				statusText: document.getElementById("statusText"),
				welcomeText: document.getElementById("welcomeText"),
				coursesCard: document.getElementById("coursesCard"),
				coursesTitle: document.getElementById("coursesTitle"),
				coursesDesc: document.getElementById("coursesDesc"),
				batchAffairsCard: document.getElementById("batchAffairsCard"),
				batchAffairsTitle: document.getElementById("batchAffairsTitle"),
				batchAffairsDesc: document.getElementById("batchAffairsDesc"),
				profileCard: document.getElementById("profileCard"),
				profileTitle: document.getElementById("profileTitle"),
				nameLabel: document.getElementById("nameLabel"),
				nameValue: document.getElementById("nameValue"),
				alertsCard: document.getElementById("alertsCard"),
				alertsTitle: document.getElementById("alertsTitle"),
				alertsDesc: document.getElementById("alertsDesc"),
			};

			let currentLang = "ar";

			function updateLanguageButtons() {
				const activeClass = "bg-gradient-to-r from-accentPurple to-accentIndigo text-white shadow-soft-lg";
				const inactiveClass = "text-darkGray/70";
				el.langAr.className = "rounded-full px-3 py-1.5 font-semibold transition duration-300 " + (currentLang === "ar" ? activeClass : inactiveClass);
				el.langEn.className = "rounded-full px-3 py-1.5 font-semibold transition duration-300 " + (currentLang === "en" ? activeClass : inactiveClass);
			}

			function applyLanguage(lang) {
				currentLang = lang;
				const t = i18n[lang];
				document.documentElement.lang = lang;
				document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
				document.title = t.title;
				el.welcomeTitle.textContent = t.welcomeTitle;
				el.welcomeName.textContent = t.welcomeName;
				el.statusText.textContent = t.statusText;
				el.welcomeText.className = "space-y-3 " + (lang === "ar" ? "text-right" : "text-left");
				el.coursesCard.title = t.coursesCardTooltip;
				el.coursesTitle.textContent = t.coursesTitle;
				el.coursesDesc.textContent = t.coursesDesc;
				el.batchAffairsCard.title = t.batchAffairsCardTooltip;
				el.batchAffairsTitle.textContent = t.batchAffairsTitle;
				el.batchAffairsDesc.textContent = t.batchAffairsDesc;
				el.profileCard.title = t.profileCardTooltip;
				el.profileTitle.textContent = t.profileTitle;
				el.nameLabel.textContent = t.nameLabel;
				el.nameValue.textContent = t.nameValue;
				el.alertsCard.title = t.alertsCardTooltip;
				el.alertsTitle.textContent = t.alertsTitle;
				el.alertsDesc.textContent = t.alertsDesc;
				updateLanguageButtons();
			}

			el.langAr.addEventListener("click", () => applyLanguage("ar"));
			el.langEn.addEventListener("click", () => applyLanguage("en"));
			if (window.lucide) {
				window.lucide.createIcons();
			}
			applyLanguage("ar");
		</script>
	</body>
</html>
